<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Походный чек-лист тихоходок</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js">
    </script>

    <style>
        :root {
            --primary: #4f7cff;
            --primary-dark: #3a5fce;
            --accent: #34c759;
            --danger: #ff3b30;
            --danger-hover: #e0352b;
            --bg: #f2f4f8;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-light: #6e6e8a;
            --border: #e5e7eb;
            --radius: 14px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --card-hover-bg: #f0f2f5;
            --input-bg: #f8f9fc;
            --stat-bg: #f8f9fc;
            --badge-optional-bg: #fff3cd;
            --badge-optional-text: #856404;
            --badge-required-bg: #ffe0e0;
            --badge-required-text: #b71c1c;
            --modal-overlay: rgba(0, 0, 0, 0.35);
            --category-header-bg: #fafbfc;
            --checkbox-bg: #ffffff;
            --progress-bg: #eef0f5;
            --add-btn-hover-bg: #f3fff5;
            --item-hover-bg: #eef2ff;
            --item-hover-border: #d0d8ff;
            --sync-synced-bg: #e5f9e8;
            --sync-synced-text: #1e7e34;
            --sync-pending-bg: #fff3e0;
            --sync-pending-text: #e65100;
            --alert-error-bg: #ffe5e5;
            --alert-error-text: #b71c1c;
            --alert-success-bg: #e3f9e9;
            --alert-success-text: #1b5e20;
            --default-badge-bg: #e5e7eb;
            --default-badge-text: #1a1a2e;
            --admin-badge-bg: #d4e4ff;
            --admin-badge-text: #1a3f8a;
            --shared-badge-bg: #e8f5e9;
            --shared-badge-text: #1b5e20;
        }

        body.dark {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --text-light: #a0a0b0;
            --border: #2a2a4a;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --card-hover-bg: #1f2b47;
            --input-bg: #1f2b47;
            --stat-bg: #1f2b47;
            --badge-optional-bg: #4a4520;
            --badge-optional-text: #ffd54f;
            --badge-required-bg: #4a2020;
            --badge-required-text: #ff8a80;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --category-header-bg: #1f2b47;
            --checkbox-bg: #16213e;
            --progress-bg: #2a2a4a;
            --add-btn-hover-bg: #1b3a2a;
            --item-hover-bg: #2a2a4a;
            --item-hover-border: #4a4a6a;
            --sync-synced-bg: #1b3a2a;
            --sync-synced-text: #7ddf90;
            --sync-pending-bg: #4a3520;
            --sync-pending-text: #ffb74d;
            --alert-error-bg: #4a2020;
            --alert-error-text: #ff8a80;
            --alert-success-bg: #1b3a2a;
            --alert-success-text: #7ddf90;
            --default-badge-bg: #2a2a4a;
            --default-badge-text: #c0c0d0;
            --admin-badge-bg: #1a2f5a;
            --admin-badge-text: #8ab4ff;
            --shared-badge-bg: #1b3a2a;
            --shared-badge-text: #7ddf90;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 1.8rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            background: transparent;
            color: var(--text);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(79, 124, 255, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
        }
        .btn-accent:hover {
            background: #2eb150;
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
        }
        .btn-danger:hover {
            background: var(--danger-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--card-hover-bg);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-light);
            padding: 6px 10px;
        }
        .btn-ghost:hover {
            background: var(--card-hover-bg);
            color: var(--primary);
        }
        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            background: transparent;
            transition: var(--transition);
            color: var(--text-light);
        }
        .btn-icon:hover {
            background: var(--card-hover-bg);
            color: var(--primary);
        }

        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--card-hover-bg);
            color: var(--text-light);
        }
        .sync-badge.synced {
            background: var(--sync-synced-bg);
            color: var(--sync-synced-text);
        }
        .sync-badge.pending {
            background: var(--sync-pending-bg);
            color: var(--sync-pending-text);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .hidden {
            display: none !important;
        }

        main {
            display: flex;
            gap: 20px;
            flex: 1;
        }
        .sidebar {
            width: 340px;
            flex-shrink: 0;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 20px;
            align-self: flex-start;
            max-height: calc(100vh - 64px);
            overflow-y: auto;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }

        .trip-date-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .countdown {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-top: 6px;
        }

        .search-filter-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }
        .search-input {
            flex: 1;
            min-width: 150px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }
        .search-input:focus {
            border-color: var(--primary);
        }
        .filter-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .progress-section h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .progress-bar {
            height: 8px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: var(--stat-bg);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        .shared-session-box {
            margin-top: 16px;
            padding: 14px;
            background: var(--stat-bg);
            border-radius: 12px;
            border: 2px solid var(--accent);
        }
        .shared-session-box h4 {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .participant-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0;
            padding: 8px 10px;
            background: var(--card-bg);
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .participant-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .participant-progress {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .role-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .role-admin {
            background: var(--admin-badge-bg);
            color: var(--admin-badge-text);
        }
        .role-participant {
            background: var(--default-badge-bg);
            color: var(--default-badge-text);
        }
        .shared-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 12px;
            background: var(--shared-badge-bg);
            color: var(--shared-badge-text);
            font-weight: 600;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            background: var(--category-header-bg);
            border-bottom: 1px solid transparent;
        }
        .category-header:hover {
            background: var(--card-hover-bg);
        }
        .category-card.expanded .category-header {
            border-bottom-color: var(--border);
        }
        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            flex: 1;
            min-width: 0;
        }
        .category-progress {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-left: auto;
            margin-right: 12px;
            white-space: nowrap;
        }
        .category-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .collapse-icon {
            transition: transform 0.3s ease;
            font-size: 1.1rem;
            color: var(--text-light);
        }
        .category-card.expanded .collapse-icon {
            transform: rotate(180deg);
        }
        .items-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        .category-card.expanded .items-wrapper {
            max-height: 5000px;
            padding: 16px 20px;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 10px;
        }
        .item-card {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-radius: 10px;
            background: var(--card-hover-bg);
            cursor: grab;
            transition: var(--transition);
            gap: 10px;
            position: relative;
            border: 1px solid transparent;
        }
        .item-card:active {
            cursor: grabbing;
        }
        .item-card:hover {
            background: var(--item-hover-bg);
            border-color: var(--item-hover-border);
        }
        .item-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.8rem;
            background: var(--checkbox-bg);
            transition: var(--transition);
            cursor: pointer;
        }
        .item-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .item-text {
            flex: 1;
            min-width: 0;
            word-break: break-word;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .weight-badge {
            font-size: 0.7rem;
            margin-left: 6px;
            color: var(--text-light);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: var(--stat-bg);
            padding: 2px 6px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .weight-badge:hover {
            background: var(--primary);
            color: #fff;
        }
        .item-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .badge-optional {
            background: var(--badge-optional-bg);
            color: var(--badge-optional-text);
        }
        .badge-required {
            background: var(--badge-required-bg);
            color: var(--badge-required-text);
        }
        .badge-default {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 20px;
            background: var(--default-badge-bg);
            color: var(--default-badge-text);
        }
        .item-delete-btn {
            opacity: 0;
            transition: opacity 0.2s;
            flex-shrink: 0;
            color: var(--danger);
            font-size: 1.1rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            border-radius: 6px;
        }
        .item-card:hover .item-delete-btn {
            opacity: 1;
        }
        .item-delete-btn:hover {
            background: rgba(255, 59, 48, 0.1);
        }
        .sortable-ghost {
            opacity: 0.4;
            background: #d0d8ff;
        }

        .add-item-btn,
        .add-category-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            margin-top: 12px;
            border: 2px dashed var(--border);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-light);
            font-size: 0.85rem;
            transition: var(--transition);
            background: transparent;
            width: 100%;
            justify-content: center;
            font-weight: 600;
        }
        .add-item-btn:hover,
        .add-category-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--add-btn-hover-bg);
        }

        .checklist-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .checklist-tab {
            padding: 8px 16px;
            background: var(--card-hover-bg);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid transparent;
            color: var(--text);
            transition: var(--transition);
        }
        .checklist-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .checklist-tab.shared-tab {
            background: var(--shared-badge-bg);
            color: var(--shared-badge-text);
            border: 1px dashed var(--accent);
        }
        .checklist-tab.shared-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .checklist-tab:hover:not(.active) {
            background: var(--border);
        }

        .login-container {
            max-width: 460px;
            margin: 30px auto;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 28px;
            width: 100%;
        }
        .login-title {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: var(--transition);
            color: var(--text);
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary);
            background: var(--card-bg);
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--card-hover-bg);
            padding: 3px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            transition: var(--transition);
            font-size: 0.9rem;
            border-radius: 8px;
            color: var(--text-light);
        }
        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            display: none;
        }
        .alert-error {
            background: var(--alert-error-bg);
            color: var(--alert-error-text);
            display: block;
        }
        .alert-success {
            background: var(--alert-success-bg);
            color: var(--alert-success-text);
            display: block;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(2px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            color: var(--text);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 16px;
            font-weight: 700;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a2e;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .section-divider {
            border-top: 2px dashed var(--border);
            margin: 16px 0;

            function openModal(title, contentHTML, onSave) {

                overlay.innerHTML =
                    `<div class="modal"><h3>${title}</h3><div>${contentHTML}</div><div class="modal-actions"><button class="btn btn-ghost" data-action="cancel">Отмена</button><button class="btn btn-primary" data-action="save">Сохранить</button></div></div>`;
                document.body.appendChild(overlay);
                const close = () => overlay.remove();
                overlay.querySelector('[data-action="cancel"]').addEventListener('click', close);
                overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
                overlay.querySelector('[data-action="save"]').addEventListener('click', () => {
                    const result = onSave(overlay.querySelector('.modal'));
                    if (result !== false) close();
                });
                setTimeout(() => {
                    const input = overlay.querySelector('input');
                    if (input) input.focus();
                }, 100);
            }

                appState.isSharedChecklistActive = false;
