            function initFirebase() {
                if (!firebaseConfig.apiKey || !firebaseConfig.projectId) {
                    appState.firebaseAvailable = false;
                    return Promise.resolve(false);
                }
                try {
                    firebase.initializeApp(firebaseConfig);
                    const db = firebase.firestore();
                    return db.collection('_ping').doc('test').set({ time: Date.now() }, { merge: true })
                        .then(() => { appState.firebaseAvailable = true;
                            appState.db = db; return true; })
                        .catch(() => { appState.firebaseAvailable = false; return false; });
                } catch (e) { appState.firebaseAvailable = false; return Promise.resolve(false); }
            }

            async function loadSharedSessionsMeta() {
                if (!appState.firebaseAvailable || !appState.currentUser) return;
                try {
                    const snapshot = await appState.db.collection('sharedSessions')
                        .where('participants.' + appState.currentUser.username + '.name', '==', appState
                            .currentUser.username)
                        .get();
                    const sessions = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        sessions.push({
                            id: doc.id,
                            name: data.name || 'Совместный поход',
                            creator: data.creator,
                            role: data.participants?.[appState.currentUser.username]?.role || 'participant',
                            updatedAt: data.updatedAt,
                        });
                    });
                    sessions.sort((a, b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));
                    appState.sharedSessionsMeta = sessions;
                    await persistData();
                    renderTripTabs();
                } catch (e) { console.error('Ошибка загрузки совместных сессий:', e); }
            }

            async function createSharedSession() {
                const cl = getCurrentChecklist();
                if (!cl || cl.isShared) { showToast('Выберите личный список'); return; }
                if (!appState.firebaseAvailable) { showToast('Требуется облако'); return; }
                const sessionId = 'session_' + Date.now();
                const username = appState.currentUser.username;
                try {
                    await appState.db.collection('sharedSessions').doc(sessionId).set({
                        checklistData: JSON.parse(JSON.stringify(cl.checklistData)),
                        userCategories: JSON.parse(JSON.stringify(cl.userCategories || [])),
                        name: cl.name + ' (совместный)',
                        creator: username,
                        participants: {
                            [username]: { name: username, role: 'admin', checkedItems: { ...cl.selectedItems } }
                        },
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                    appState.sharedSessionId = sessionId;
                    appState.isSharedChecklistActive = true;
                    appState.isAdminOfCurrentSession = true;
                    appState.currentChecklistId = null;
                    subscribeToSharedSession(sessionId);
                    await loadSharedSessionsMeta();
                    const link = `${window.location.origin}${window.location.pathname}?session=${sessionId}`;
                    try { await navigator.clipboard.writeText(link);
                        showToast('✅ Совместный поход создан! Ссылка скопирована.'); } catch (e) { showToast(
                            '✅ Совместный поход создан! ID: ' + sessionId); }
                    renderAll();
                } catch (e) { showToast('Ошибка создания сессии: ' + e.message); }
            }

            async function joinSharedSession(sessionId, userName) {
                if (!appState.firebaseAvailable) { showToast('Требуется облако'); return; }
                if (!userName || userName.trim().length < 2) { showToast('Имя минимум 2 символа'); return; }
                try {
                    const docRef = appState.db.collection('sharedSessions').doc(sessionId);
                    const doc = await docRef.get();
                    if (!doc.exists) { showToast('Сессия не найдена'); return; }
                    const data = doc.data();
                    if (!data.participants) data.participants = {};
                    if (data.participants[userName]) {
                        if (appState.currentUser && appState.currentUser.username === userName) {
                            switchToSharedSession(sessionId);
                            showToast('Вы уже участник этой сессии');
                            return;
                        } else {
                            showToast('Имя занято другим участником');
                            return;
                        }
                    }
                    data.participants[userName] = { name: userName, role: 'participant', checkedItems: {} };
                    await docRef.update({
                        participants: data.participants,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    if (!appState.currentUser || appState.currentUser.isGuest) {
                        appState.currentUser = { username: userName, isGuest: true, passwordHash: '' };
                    }
                    appState.sharedSessionId = sessionId;
                    appState.isSharedChecklistActive = true;
                    appState.isAdminOfCurrentSession = false;
                    appState.currentChecklistId = null;
                    subscribeToSharedSession(sessionId);
                    await loadSharedSessionsMeta();
                    renderApp();
                    showToast('✅ Вы присоединились!');
                } catch (e) { showToast('Ошибка: ' + e.message); }
            }

            async function autoJoinSharedSession(sessionId) {
                if (!appState.firebaseAvailable || !appState.currentUser) return;
                try {
                    const doc = await appState.db.collection('sharedSessions').doc(sessionId).get();
                    if (!doc.exists) { showToast('Сессия не найдена'); return; }
                    const data = doc.data();
                    const myName = appState.currentUser.username;
                    if (data.participants?.[myName]) {
                        switchToSharedSession(sessionId);
                    } else {
                        await joinSharedSession(sessionId, myName);
                    }
                } catch (e) { showToast('Ошибка подключения к сессии: ' + e.message); }
            }

            function subscribeToSharedSession(sessionId) {
                if (appState.sharedSessionUnsubscribe) appState.sharedSessionUnsubscribe();
                const unsub = appState.db.collection('sharedSessions').doc(sessionId)
                    .onSnapshot((doc) => {
                        if (!doc.exists) {
                            showToast('Сессия была удалена администратором');
                            leaveSharedSession(true);
                            return;
                        }
                        appState.sharedSessionData = doc.data();
                        appState.isAdminOfCurrentSession = getMySharedRole() === 'admin';
                        if (appState.sharedSessionData && appState.currentUser && !appState.sharedSessionData
                            .participants?.[appState.currentUser.username]) {
                            leaveSharedSession(true);
                            showToast('Вы были удалены из сессии');
                            return;
                        }
                        updateSharedSessionsMetaFromSnapshot(sessionId, doc.data());
                        renderAll();
                    }, (err) => {
                        console.error('Ошибка синхронизации:', err);
                        showToast('Ошибка синхронизации');
                    });
                appState.sharedSessionUnsubscribe = unsub;
            }

            function updateSharedSessionsMetaFromSnapshot(sessionId, data) {
                const existing = appState.sharedSessionsMeta.find(s => s.id === sessionId);
                const meta = {
                    id: sessionId,
                    name: data?.name || 'Совместный поход',
                    creator: data?.creator,
                    role: data?.participants?.[appState.currentUser?.username]?.role || 'participant',
                    updatedAt: data?.updatedAt,
                };
                if (existing) Object.assign(existing, meta);
                else appState.sharedSessionsMeta.push(meta);
                appState.sharedSessionsMeta.sort((a, b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() ||
                    0));
                persistData();
                renderTripTabs();
            }

            async function toggleSharedItem(itemId) {
                if (!appState.sharedSessionId || !appState.firebaseAvailable) return;
                const myName = appState.currentUser?.username;
                if (!myName) return;
                const currentChecked = appState.sharedSessionData?.participants?.[myName]?.checkedItems || {};
                const newChecked = !currentChecked[itemId];
                const newCheckedItems = { ...currentChecked };
                if (newChecked) newCheckedItems[itemId] = true;
                else delete newCheckedItems[itemId];
                try {
                    await appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                        [`participants.${myName}.checkedItems`]: newCheckedItems,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                } catch (e) { showToast('Ошибка обновления'); }
            }

            async function toggleAllSharedItems(catId, selectAll) {
                if (!appState.sharedSessionId || !appState.firebaseAvailable) return;
                const myName = appState.currentUser?.username;
                if (!myName) return;
                const cl = getCurrentChecklist();
                const cat = cl.checklistData.find(c => c.id === catId);
                if (!cat) return;
                const currentChecked = appState.sharedSessionData?.participants?.[myName]?.checkedItems || {};
                const newCheckedItems = { ...currentChecked };
                cat.items.forEach(item => {
                    if (selectAll) newCheckedItems[item.id] = true;
                    else delete newCheckedItems[item.id];
                });
                try {
                    await appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                        [`participants.${myName}.checkedItems`]: newCheckedItems,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                } catch (e) { showToast('Ошибка обновления'); }
            }

            async function changeParticipantRole(participantName, newRole) {
                if (!appState.sharedSessionId || !appState.isAdminOfCurrentSession) return;
                try {
                    await appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                        [`participants.${participantName}.role`]: newRole,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                    showToast(`Роль обновлена: ${participantName} → ${newRole}`);
                } catch (e) { showToast('Ошибка'); }
            }

            async function removeParticipant(participantName) {
                if (!appState.sharedSessionId || !appState.isAdminOfCurrentSession) return;
                confirmDelete(`Удалить участника «${participantName}»?`, async () => {
                    try {
                        const data = appState.sharedSessionData;
                        if (data?.participants) {
                            const updated = { ...data.participants };
                            delete updated[participantName];
                            await appState.db.collection('sharedSessions').doc(appState.sharedSessionId)
                                .update({
                                    participants: updated,
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                                });
                            showToast(`Участник ${participantName} удалён`);
                        }
                    } catch (e) { showToast('Ошибка удаления'); }
                });
            }

            async function deleteSharedSession() {
                if (!appState.sharedSessionId || !appState.isAdminOfCurrentSession) return;
                confirmDelete('Полностью удалить этот совместный поход? Это действие необратимо!', async () => {
                    try {
                        await appState.db.collection('sharedSessions').doc(appState.sharedSessionId).delete();
                        showToast('Совместный поход удалён');
                        leaveSharedSession(true);
                    } catch (e) { showToast('Ошибка удаления сессии'); }
                });
            }

            function showManageSharedModal() {
                if (!appState.sharedSessionData || !appState.isAdminOfCurrentSession) return;
                const participants = appState.sharedSessionData.participants || {};
                let rows = '';
                for (const [name, pData] of Object.entries(participants)) {
                    const role = pData.role || 'participant';
                    const isMe = name === appState.currentUser?.username;
                    rows += `
                        <div style="display:flex; align-items:center; gap:8px; margin:6px 0; padding:8px; background:var(--stat-bg); border-radius:12px;">
                            <span style="font-weight:600;">${escapeHTML(name)} ${isMe ? '(вы)' : ''}</span>
                            <span class="role-badge role-${role}">${role}</span>
                            ${!isMe ? `
                                <button class="btn btn-xs btn-outline" data-action="toggle-role" data-name="${escapeHTML(name)}" data-role="${role === 'admin' ? 'participant' : 'admin'}">
                                    ${role === 'admin' ? '⬇ Участник' : '⬆ Админ'}
                                </button>
                                <button class="btn btn-xs btn-danger" data-action="remove-participant" data-name="${escapeHTML(name)}">🗑️</button>
                            ` : ''}
                        </div>`;
                }
                const contentHTML = `
                    <p style="margin-bottom:10px;color:var(--text-light);">Управление участниками.</p>
                    ${rows}
                    <hr style="margin:14px 0;border-color:var(--border);">
                    <button class="btn btn-danger btn-sm" data-action="delete-session" style="width:100%;">🗑️ Удалить совместный поход</button>
                `;
                openModal('⚙️ Управление', contentHTML, () => false);
                setTimeout(() => {
                    const modal = document.querySelector('.modal');
                    if (!modal) return;
                    modal.addEventListener('click', (e) => {
                        const btn = e.target.closest('[data-action]');
                        if (!btn) return;
                        const action = btn.dataset.action;
                        if (action === 'toggle-role') {
                            changeParticipantRole(btn.dataset.name, btn.dataset.role);
                            modal.closest('.modal-overlay')?.remove();
                        }
                        if (action === 'remove-participant') {
                            modal.closest('.modal-overlay')?.remove();
                            removeParticipant(btn.dataset.name);
                        }
                        if (action === 'delete-session') {
                            modal.closest('.modal-overlay')?.remove();
                            deleteSharedSession();
                        }
                    });
                }, 150);
            }

            function leaveSharedSession(silent = false) {
                if (appState.sharedSessionUnsubscribe) { appState.sharedSessionUnsubscribe();
                    appState.sharedSessionUnsubscribe = null; }
                const oldId = appState.sharedSessionId;
                appState.sharedSessionId = null;
                appState.isSharedChecklistActive = false;
                appState.sharedSessionData = null;
                appState.isAdminOfCurrentSession = false;
                appState.sharedSessionsMeta = appState.sharedSessionsMeta.filter(s => s.id !== oldId);
                if (appState.currentUser?.isGuest) {
                    appState.currentUser = null;
                    appState.checklists = [];
                    appState.currentChecklistId = null;
                    showLoginScreen();
                } else {
                    if (!appState.currentChecklistId && appState.checklists.length > 0)
                        appState.currentChecklistId = appState.checklists[0].id;
                    loadSharedSessionsMeta();
                    persistData();
                    renderApp();
                }
                if (!silent) showToast('Вы вышли из совместного похода');
            }

            function getSharedParticipantsProgress() {
                if (!appState.sharedSessionData?.checklistData) return [];
                const totalItems = appState.sharedSessionData.checklistData.reduce((sum, cat) => sum + cat.items.length,
                    0);
                const participants = appState.sharedSessionData.participants || {};
                return Object.entries(participants).map(([name, data]) => {
                    const checked = data.checkedItems || {};
                    const done = Object.values(checked).filter(v => v).length;
                    return { name, role: data.role || 'participant', done, total: totalItems, percent: totalItems ?
                            Math.round((done / totalItems) * 100) : 0 };
                });
            }

            async function handleLogin() {
                const username = dom.loginUsername.value.trim();
                const password = dom.loginPassword.value;
                if (!username || !password) { showAlert('Введите логин и пароль', 'error'); return; }
                const passwordHash = hashPassword(password);
                if (appState.firebaseAvailable) {
                    const cloudData = await loadUserDataFromCloud(username);
                    if (cloudData && cloudData.passwordHash === passwordHash) {
                        appState.currentUser = { username, passwordHash };
                        appState.checklists = cloudData.checklists || [];
                        appState.currentChecklistId = cloudData.currentChecklistId || appState.checklists[0]?.id;
                        appState.theme = cloudData.theme || 'light';
                        appState.sharedSessionsMeta = cloudData.sharedSessionsMeta || [];
                        applyTheme();
                        saveToLocalStorage();
                        await loadSharedSessionsMeta();
                        renderApp();
                        return;
                    } else if (cloudData && cloudData.passwordHash !== passwordHash) {
                        showAlert('❌ Неверный пароль', 'error');
                        return;
                    }
                }
                const localData = loadFromLocalStorage();
                if (localData && localData.currentUsername === username && localData.passwordHash === passwordHash) {
                    appState.currentUser = { username, passwordHash };
                    appState.checklists = localData.checklists || [];
                    appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                    appState.theme = localData.theme || 'light';
                    appState.sharedSessionsMeta = localData.sharedSessionsMeta || [];
                    applyTheme();
                    if (appState.firebaseAvailable) { await persistData();
                        await loadSharedSessionsMeta(); }
                    renderApp();
                    return;
                }
                if (!appState.firebaseAvailable && !localData) {
                    appState.currentUser = { username, passwordHash };
                    appState.sharedSessionsMeta = [];
                    createNewChecklist('Мой первый поход');
                    applyTheme();
                    renderApp();
                    return;
                }
                showAlert('❌ Неверный логин или пароль', 'error');
            }

            async function handleRegister() {
                const username = dom.regUsername.value.trim();
                const password = dom.regPassword.value;
                const password2 = dom.regPassword2.value;
                if (username.length < 3) { showAlert('Логин не менее 3 символов', 'error'); return; }
                if (password.length < 4) { showAlert('Пароль не менее 4 символов', 'error'); return; }
                if (password !== password2) { showAlert('Пароли не совпадают', 'error'); return; }
                const passwordHash = hashPassword(password);
                if (appState.firebaseAvailable) {
                    const existing = await loadUserDataFromCloud(username);
                    if (existing) { showAlert('❌ Пользователь существует', 'error'); return; }
                } else {
                    const local = loadFromLocalStorage();
                    if (local && local.currentUsername === username) { showAlert('❌ Пользователь существует локально',
                            'error'); return; }
                }
                appState.currentUser = { username, passwordHash };
                appState.checklists = [];
                appState.sharedSessionsMeta = [];
                createNewChecklist('Мой первый поход');
                applyTheme();
                await persistData();
                if (appState.firebaseAvailable) await loadSharedSessionsMeta();
                renderApp();
            }

            function handleLogout() {
                if (appState.sharedSessionId) leaveSharedSession(true);
                appState.currentUser = null;
                appState.checklists = [];
                appState.currentChecklistId = null;
                appState.sharedSessionsMeta = [];
                appState.isSharedChecklistActive = false;
                appState.sharedSessionData = null;
                appState.isAdminOfCurrentSession = false;
                if (appState.sharedSessionUnsubscribe) { appState.sharedSessionUnsubscribe();
                    appState.sharedSessionUnsubscribe = null; }
                saveToLocalStorage();
                dom.syncDot.className = 'sync-dot';
                showLoginScreen();
            }

            function applyTheme() {
                document.body.classList.toggle('dark', appState.theme === 'dark');
                localStorage.setItem('theme', appState.theme);
            }

            function toggleTheme() {
                appState.theme = appState.theme === 'light' ? 'dark' : 'light';
                applyTheme();
                persistData();
                dom.userDropdown.classList.remove('open');
            }

            function exportChecklist() {
                const cl = getCurrentChecklist();
                if (!cl) return;
                const data = { name: cl.name, checklistData: cl.checklistData, userCategories: cl.userCategories || [] };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'checklist_' + (cl.name || 'export').replace(/[^a-zA-Z0-9]/g, '_') + '.json';
                a.click();
                URL.revokeObjectURL(url);
                dom.userDropdown.classList.remove('open');
            }

            function importChecklist(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.checklistData) throw new Error();
                        const newCL = {
                            id: 'cl_import_' + Date.now(),
                            name: data.name || 'Импортированный',
                            tripDate: '',
                            checklistData: data.checklistData,
                            userCategories: data.userCategories || [],
                            selectedItems: {},
                            collapsedCategories: {}
                        };
                        appState.checklists.push(newCL);
                        appState.currentChecklistId = newCL.id;
                        appState.isSharedChecklistActive = false;
                        appState.sharedSessionId = null;
                        persistData();
                        renderAll();
                        showToast('✅ Импортирован!');
                    } catch (ex) { showToast('Ошибка формата'); }
                };
                reader.readAsText(file);
                dom.userDropdown.classList.remove('open');
            }

            function updateStatsBar() {
                const cl = getCurrentChecklist();
                let selected = 0,
                    total = 0,
                    weight = 0;
                if (cl) {
                    cl.checklistData.forEach(cat => cat.items.forEach(item => {
                        total++;
                        if (cl.selectedItems[item.id]) { selected++;
                            weight += (item.weight || 0); }
                    }));
                }
                dom.selectedCount.textContent = selected;
                dom.totalCount.textContent = total;
                dom.totalWeight.textContent = weight;
                const percent = total ? Math.round((selected / total) * 100) : 0;
                dom.ringPercent.textContent = percent + '%';
                const circumference = 157.08;
                const offset = circumference - (percent / 100) * circumference;
                dom.ringFill.style.strokeDashoffset = offset;
            }

            function renderTripTabs() {
                dom.tripTabs.innerHTML = '';
                appState.checklists.forEach(cl => {
                    const pill = document.createElement('div');
                    const isActive = cl.id === appState.currentChecklistId && !appState.isSharedChecklistActive;
                    pill.className = 'trip-pill' + (isActive ? ' active' : '');
                    pill.innerHTML = `🏕️ ${escapeHTML(cl.name)}`;
                    pill.addEventListener('click', () => switchChecklist(cl.id));
                    dom.tripTabs.appendChild(pill);
                });
                appState.sharedSessionsMeta.forEach(session => {
                    const pill = document.createElement('div');
                    const isActive = appState.isSharedChecklistActive && appState.sharedSessionId === session.id;
                    pill.className = 'trip-pill shared-pill' + (isActive ? ' active' : '');
                    pill.innerHTML =
                        `👥 ${escapeHTML(session.name)} <span class="role-badge role-${session.role}" style="margin-left:4px;">${session.role}</span>`;
                    pill.addEventListener('click', () => switchToSharedSession(session.id));
                    dom.tripTabs.appendChild(pill);
                });
                const isSharedActive = appState.isSharedChecklistActive;
                dom.addChecklistBtn.classList.toggle('hidden', isSharedActive);
                dom.copyChecklistBtn.classList.toggle('hidden', isSharedActive);
                dom.renameChecklistBtn.classList.toggle('hidden', isSharedActive);
                dom.deleteChecklistBtn.classList.toggle('hidden', isSharedActive);
                dom.refreshSharedBtn.classList.toggle('hidden', !appState.firebaseAvailable || appState
                    .sharedSessionsMeta.length === 0);
            }

            function renderChecklist() {
                const cl = getCurrentChecklist();
                if (!cl) { dom.checklistContent.innerHTML =
                        '<p style="text-align:center;padding:40px;color:var(--text-light);">Нет активного списка</p>'; return; }
                const searchTerm = dom.searchInput.value.toLowerCase();
                const filter = appState.currentFilter;
                const isShared = !!cl.isShared;
                const isAdmin = appState.isAdminOfCurrentSession;

                dom.checklistContent.innerHTML = '';
                cl.checklistData.forEach(cat => {
                    let filteredItems = cat.items;
                    if (searchTerm) filteredItems = filteredItems.filter(i => i.text.toLowerCase().includes(
                        searchTerm));
                    if (filter === 'required') filteredItems = filteredItems.filter(i => i.required);
                    if (filter === 'optional') filteredItems = filteredItems.filter(i => !i.required);
                    if (filter === 'checked') filteredItems = filteredItems.filter(i => cl.selectedItems[i.id]);
                    if (filter === 'unchecked') filteredItems = filteredItems.filter(i => !cl.selectedItems[i.id]);

                    const card = document.createElement('div');
                    card.className = 'category-card';
                    card.dataset.catId = cat.id;
                    const allSelected = cat.items.length && cat.items.every(i => cl.selectedItems[i.id]);
                    const progress = (() => { const t = cat.items.length; const d = cat.items.filter(i => cl
                            .selectedItems[i.id]).length; return t ? `${d}/${t} (${Math.round(d/t*100)}%)` :
                            ''; })();
                    card.innerHTML = `
                        <div class="category-header" data-action="toggle-collapse">
                            <div class="category-title">
                                <span>${escapeHTML(cat.category)}</span>
                                ${cat.isDefault ? '<span class="badge-default">базовая</span>' : ''}
                            </div>
                            <span class="category-progress">${progress}</span>
                            <div class="category-actions">
                                <button class="btn btn-sm btn-ghost" data-action="toggle-items">${allSelected ? '☑️ Снять все' : '☐ Выбрать все'}</button>
                                ${(!cat.isDefault && !isShared) || (isShared && isAdmin && !cat.isDefault) ? '<button class="icon-btn danger" data-action="delete-cat" style="font-size:0.9rem;">🗑️</button>' : ''}
                                <span class="collapse-icon">▼</span>
                            </div>
                        </div>
                        <div class="items-wrapper">
                            <div class="items-grid" data-cat-id="${cat.id}">
                                ${filteredItems.map(item => {
                                    const checked = !!cl.selectedItems[item.id];
                                    return `<div class="item-card" data-item-id="${item.id}">
                                        <div class="item-checkbox ${checked ? 'checked' : ''}" data-action="toggle-item">${checked ? '✓' : ''}</div>
                                        <div class="item-text" data-action="toggle-item">${escapeHTML(item.text)}</div>
                                        <span class="weight-badge" data-action="edit-weight">⚖️ ${item.weight || 0}г</span>
                                        ${item.optional ? '<span class="item-badge badge-optional">необяз.</span>' : ''}
                                        ${item.required ? '<span class="item-badge badge-required">обяз.</span>' : ''}
                                        ${(!isShared || isAdmin) ? '<button class="item-delete-btn" data-action="delete-item">🗑️</button>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                            ${(!isShared || isAdmin) ? '<button class="add-item-btn" data-action="add-item">+ Добавить предмет</button>' : ''}
                        </div>`;
                    card.addEventListener('click', function(e) {
                        const actionEl = e.target.closest('[data-action]');
                        const action = actionEl?.dataset?.action;
                        const itemCard = e.target.closest('.item-card');
                        const itemId = itemCard?.dataset?.itemId;
                        if (action === 'toggle-collapse' && !e.target.closest('button') && !itemCard) {
                            card.classList.toggle('collapsed');
                            return;
                        }
                        if ((action === 'toggle-item' || (itemCard && !e.target.closest('button'))) && itemId) {
                            if (isShared) toggleSharedItem(itemId);
                            else toggleItem(itemId);
                            return;
                        }
                        if (action === 'toggle-items') {
                            if (isShared) toggleAllSharedItems(cat.id, !allSelected);
                            else toggleCategoryItems(cat.id, !allSelected);
                            return;
                        }
                        if (action === 'delete-cat') { deleteCategory(cat.id); return; }
                        if (action === 'add-item') { showAddItemModal(cat.id); return; }
                        if (action === 'delete-item' && itemId) { deleteItem(cat.id, itemId); return; }
                        if (action === 'edit-weight' && itemId) { editItemWeight(cat.id, itemId); return; }
                    });
                    dom.checklistContent.appendChild(card);
                });

                document.querySelectorAll('.items-grid').forEach(grid => {
                    if (grid.sortableInstance) grid.sortableInstance.destroy();
                    if (!appState.isSharedChecklistActive || appState.isAdminOfCurrentSession) {
                        grid.sortableInstance = new Sortable(grid, {
                            group: 'items',
                            animation: 150,
                            ghostClass: 'sortable-ghost',
                            handle: '.item-card',
                            filter: 'button, .weight-badge',
                            preventOnFilter: true,
                            onEnd: function(evt) {
                                const catId = evt.to.dataset.catId;
                                const cat = cl.checklistData.find(c => c.id === catId);
                                if (!cat) return;
                                const movedItemId = evt.item.dataset.itemId;
                                const oldIndex = evt.oldIndex;
                                const newIndex = evt.newIndex;
                                if (oldIndex !== newIndex && movedItemId) {
                                    const item = cat.items.splice(oldIndex, 1)[0];
                                    cat.items.splice(newIndex, 0, item);
                                    if (isShared && appState.sharedSessionId && appState.firebaseAvailable) {
                                        appState.db.collection('sharedSessions').doc(appState
                                            .sharedSessionId).update({
                                            checklistData: cl.checklistData,
                                            updatedAt: firebase.firestore.FieldValue
                                                .serverTimestamp(),
                                        }).catch(() => {});
                                    } else { persistData(); }
                                }
                            }
                        });
                    }
                });
                updateStatsBar();
                renderSharedParticipantsBar();
            }

            function renderSharedParticipantsBar() {
                if (appState.isSharedChecklistActive && appState.sharedSessionData) {
                    dom.sharedParticipantsBar.classList.remove('hidden');
                    dom.manageSharedBtn.classList.toggle('hidden', !appState.isAdminOfCurrentSession);
                    const participants = getSharedParticipantsProgress();
                    dom.sharedParticipantsList.innerHTML = participants.map(p => `
                        <span class="participant-chip">
                            ${escapeHTML(p.name)}
                            <span class="role-badge role-${p.role}">${p.role}</span>
                            <span style="font-size:0.7rem;color:var(--text-light);">${p.done}/${p.total} (${p.percent}%)</span>
                        </span>
                    `).join('');
                } else {
                    dom.sharedParticipantsBar.classList.add('hidden');
                }
            }

            function toggleItem(itemId) {
                const cl = getCurrentChecklist();
                if (!cl || cl.isShared) return;
                cl.selectedItems[itemId] = !cl.selectedItems[itemId];
                persistData();
                renderAll();
            }

            function toggleCategoryItems(catId, selectAll) {
                const cl = getCurrentChecklist();
                if (!cl || cl.isShared) return;
                const cat = cl.checklistData.find(c => c.id === catId);
                if (!cat) return;
                cat.items.forEach(i => { cl.selectedItems[i.id] = selectAll; });
                persistData();
                renderAll();
            }

            function deleteItem(catId, itemId) {
                const cl = getCurrentChecklist();
                const cat = cl.checklistData.find(c => c.id === catId);
                if (!cat) return;
                const item = cat.items.find(i => i.id === itemId);
                if (!item) return;
                confirmDelete(`Удалить «${item.text}»?`, () => {
                    cat.items = cat.items.filter(i => i.id !== itemId);
                    delete cl.selectedItems[itemId];
                    if (cl.isShared && appState.sharedSessionId && appState.firebaseAvailable) {
                        appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                            checklistData: cl.checklistData,
                            userCategories: cl.userCategories || [],
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        }).catch(() => {});
                    }
                    persistData();
                    renderAll();
                });
            }

            function deleteCategory(catId) {
                const cl = getCurrentChecklist();
                const cat = cl.checklistData.find(c => c.id === catId);
                if (!cat || cat.isDefault) { showToast('Базовые категории нельзя удалить'); return; }
                confirmDelete(`Удалить категорию «${cat.category}»?`, () => {
                    cl.checklistData = cl.checklistData.filter(c => c.id !== catId);
                    cl.userCategories = (cl.userCategories || []).filter(c => c.id !== catId);
                    cat.items.forEach(i => delete cl.selectedItems[i.id]);
                    if (cl.isShared && appState.sharedSessionId && appState.firebaseAvailable) {
                        appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                            checklistData: cl.checklistData,
                            userCategories: cl.userCategories || [],
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        }).catch(() => {});
                    }
                    persistData();
                    renderAll();
                });
            }

            function editItemWeight(catId, itemId) {
                const cl = getCurrentChecklist();
                const cat = cl.checklistData.find(c => c.id === catId);
                const item = cat?.items.find(i => i.id === itemId);
                if (!item) return;
                const newWeight = prompt('Вес в граммах:', item.weight || 0);
                if (newWeight !== null && !isNaN(newWeight) && newWeight >= 0) {
                    item.weight = Math.max(0, parseInt(newWeight) || 0);
                    if (cl.isShared && appState.sharedSessionId && appState.firebaseAvailable) {
                        appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                            checklistData: cl.checklistData,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        }).catch(() => {});
                    }
                    persistData();
                    renderAll();
                }
            }

            function showAddItemModal(catId) {
                const cl = getCurrentChecklist();
                const cat = cl.checklistData.find(c => c.id === catId);
                if (!cat) return;
                openModal(`➕ Элемент в «${cat.category}»`, `
                    <div class="form-group"><label class="form-label">Название</label><input class="form-input modal-name" placeholder="Название"></div>
                    <div class="form-group"><label class="form-label">Тип</label><select class="form-input modal-type"><option value="required">Обязательный</option><option value="optional">Необязательный</option></select></div>
                    <div class="form-group"><label class="form-label">Вес (г)</label><input class="form-input modal-weight" type="number" value="0" min="0"></div>
                `, (modal) => {
                    const name = modal.querySelector('.modal-name').value.trim();
                    if (!name) { showToast('Введите название'); return false; }
                    const type = modal.querySelector('.modal-type').value;
                    const weight = parseInt(modal.querySelector('.modal-weight').value) || 0;
                    const newItem = { id: 'item_' + Date.now(), text: name, required: type === 'required',
                        optional: type === 'optional', weight };
                    cat.items.push(newItem);
                    if (cl.isShared && appState.sharedSessionId && appState.firebaseAvailable) {
                        appState.db.collection('sharedSessions').doc(appState.sharedSessionId).update({
                            checklistData: cl.checklistData,
                            userCategories: cl.userCategories || [],
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        }).catch(() => {});
                    }
                    persistData();
                    renderAll();
                });
            }

            function showAddCategoryModal() {
                const cl = getCurrentChecklist();
                if (!cl || cl.isShared) return;
                openModal('➕ Новая категория',
                    '<div class="form-group"><label class="form-label">Название</label><input class="form-input modal-name" placeholder="Например: 🍔 Еда"></div>',
                    (modal) => {
                        const name = modal.querySelector('.modal-name').value.trim();
                        if (!name) { showToast('Введите название'); return false; }
                        const newCat = { id: 'cat_user_' + Date.now(), category: name, isDefault: false,
                            items: [] };
                        cl.checklistData.push(newCat);
                        if (!cl.userCategories) cl.userCategories = [];
                        cl.userCategories.push(newCat);
                        persistData();
                        renderAll();
                    });
            }

            function updateTripDate() {
                const cl = appState.checklists.find(c => c.id === appState.currentChecklistId);
                if (!cl || appState.isSharedChecklistActive) return;
                cl.tripDate = dom.tripDateInput.value;
                persistData();
                updateCountdown();
            }

            function updateCountdown() {
                const cl = appState.checklists.find(c => c.id === appState.currentChecklistId);
                if (!cl || !cl.tripDate || appState.isSharedChecklistActive) { dom.countdownDisplay.textContent =
                    ''; return; }
                const now = new Date();
                const trip = new Date(cl.tripDate);
                const diff = Math.ceil((trip - now) / (1000 * 60 * 60 * 24));
                if (diff > 0) dom.countdownDisplay.textContent = `До похода: ${diff} дн.`;
                else if (diff === 0) dom.countdownDisplay.textContent = 'Поход сегодня!';
                else dom.countdownDisplay.textContent = 'Поход завершён';
            }

            function renderAll() {
                renderTripTabs();
                const cl = getCurrentChecklist();
                if (cl && !cl.isShared) {
                    const personalCl = appState.checklists.find(c => c.id === appState.currentChecklistId);
                    dom.tripDateInput.value = personalCl?.tripDate || '';
                    dom.tripDateInput.disabled = false;
                    dom.tripDateDisplay.classList.remove('hidden');
                    updateCountdown();
                } else if (cl && cl.isShared) {
                    dom.tripDateInput.value = '';
                    dom.tripDateInput.disabled = true;
                    dom.tripDateDisplay.classList.add('hidden');
                }
                renderChecklist();
                updateUIForMode();
            }

            function updateUIForMode() {
                const isShared = appState.isSharedChecklistActive;
                dom.sharedDot.classList.toggle('visible', isShared);
                dom.createSharedBtn.classList.toggle('hidden', isShared || !appState.firebaseAvailable);
                dom.addCategoryBtn.classList.toggle('hidden', isShared);
                dom.exportBtn.classList.remove('hidden');
                dom.importBtn.classList.toggle('hidden', isShared);
                dom.collapseAllBtn.classList.remove('hidden');
                dom.expandAllBtn.classList.add('hidden');
            }

            function renderApp() {
                if (!appState.currentUser) { showLoginScreen(); return; }
                dom.loginContainer.classList.add('hidden');
                dom.mainContent.classList.remove('hidden');
                dom.logoutBtn.classList.remove('hidden');
                dom.headerUserInfo.textContent = appState.currentUser.username;
                dom.userAvatar.textContent = appState.currentUser.username.charAt(0).toUpperCase();
                if (appState.firebaseAvailable) {
                    dom.syncDot.className = 'sync-dot synced';
                } else {
                    dom.syncDot.className = 'sync-dot';
                }
                if (!appState.currentChecklistId && appState.checklists.length > 0 && !appState.isSharedChecklistActive)
                    appState.currentChecklistId = appState.checklists[0].id;
                renderAll();
            }

            function showLoginScreen() {
                dom.mainContent.classList.add('hidden');
                dom.loginContainer.classList.remove('hidden');
                dom.logoutBtn.classList.add('hidden');
                dom.sharedDot.classList.remove('visible');
                dom.syncDot.className = 'sync-dot';
                dom.collapseAllBtn.classList.add('hidden');
                dom.expandAllBtn.classList.add('hidden');
                dom.sharedParticipantsBar.classList.add('hidden');
                dom.headerUserInfo.textContent = 'Гость';
                dom.userAvatar.textContent = '?';
                dom.alertBox.className = 'alert';
                dom.alertBox.style.display = 'none';
                dom.loginUsername.value = '';
                dom.loginPassword.value = '';
                dom.regUsername.value = '';
                dom.regPassword.value = '';
                dom.regPassword2.value = '';
                dom.joinSessionId.value = '';
                dom.joinUserName.value = '';
                dom.tabLogin.classList.remove('hidden');
                dom.tabRegister.classList.add('hidden');
                dom.tabJoin.classList.add('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                const loginTabBtn = document.querySelector('[data-tab="login"]');
                if (loginTabBtn) loginTabBtn.classList.add('active');
                dom.tripTabs.innerHTML = '';
                dom.checklistContent.innerHTML = '';
            }

            // Event bindings
            dom.userMenuTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                dom.userDropdown.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!dom.userMenuTrigger.contains(e.target) && !dom.userDropdown.contains(e.target)) {
                    dom.userDropdown.classList.remove('open');
                }
            });
            dom.loginBtn.addEventListener('click', handleLogin);
            dom.registerBtn.addEventListener('click', handleRegister);
            dom.logoutBtn.addEventListener('click', () => { dom.userDropdown.classList.remove('open');
                handleLogout(); });
            dom.themeToggle.addEventListener('click', toggleTheme);
            dom.collapseAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.category-card').forEach(c => c.classList.add('collapsed'));
                dom.collapseAllBtn.classList.add('hidden');
                dom.expandAllBtn.classList.remove('hidden');
            });
            dom.expandAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.category-card').forEach(c => c.classList.remove('collapsed'));
                dom.expandAllBtn.classList.add('hidden');
                dom.collapseAllBtn.classList.remove('hidden');
            });
            dom.exportBtn.addEventListener('click', exportChecklist);
            dom.importBtn.addEventListener('click', () => { dom.userDropdown.classList.remove('open');
                dom.importFileInput.click(); });
            dom.importFileInput.addEventListener('change', (e) => { if (e.target.files[0]) importChecklist(e.target
                    .files[0]);
                e.target.value = ''; });
            dom.createSharedBtn.addEventListener('click', () => { dom.userDropdown.classList.remove('open');
                createSharedSession(); });
            dom.copySharedLinkBtn.addEventListener('click', () => {
                const link =
                `${window.location.origin}${window.location.pathname}?session=${appState.sharedSessionId}`;
                navigator.clipboard.writeText(link).then(() => showToast('🔗 Ссылка скопирована!'));
            });
            dom.manageSharedBtn.addEventListener('click', showManageSharedModal);
            dom.leaveSharedBtn.addEventListener('click', () => confirmDelete('Выйти из совместного похода?',
            leaveSharedSession));
            dom.addCategoryBtn.addEventListener('click', showAddCategoryModal);
            dom.addChecklistBtn.addEventListener('click', () => {
                const name = prompt('Название нового списка:', 'Поход ' + new Date().toLocaleDateString());
                if (name) createNewChecklist(name);
            });
            dom.copyChecklistBtn.addEventListener('click', duplicateChecklist);
            dom.renameChecklistBtn.addEventListener('click', () => {
                const cl = appState.checklists.find(c => c.id === appState.currentChecklistId);
                if (cl) { const newName = prompt('Новое имя:', cl.name); if (newName) renameChecklist(newName); }
            });
            dom.deleteChecklistBtn.addEventListener('click', deleteChecklist);
            dom.tripDateInput.addEventListener('change', updateTripDate);
            dom.searchInput.addEventListener('input', () => renderChecklist());
            dom.refreshSharedBtn.addEventListener('click', async () => {
                if (appState.firebaseAvailable) await loadSharedSessionsMeta();
                showToast('🔄 Обновлено');
            });
            dom.loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
            dom.loginUsername.addEventListener('keydown', (e) => { if (e.key === 'Enter') dom.loginPassword.focus(); });
            dom.regPassword2.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleRegister(); });
            dom.joinSessionId.addEventListener('keydown', (e) => { if (e.key === 'Enter') dom.joinUserName.focus(); });
            dom.joinUserName.addEventListener('keydown', (e) => { if (e.key === 'Enter') {
                    const sid = dom.joinSessionId.value.trim();
                    const uname = dom.joinUserName.value.trim();
                    if (sid && uname) joinSharedSession(sid, uname);
                } });

            // Filter chips
            dom.filterChips.addEventListener('click', (e) => {
                const chip = e.target.closest('.filter-chip');
                if (!chip) return;
                dom.filterChips.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                appState.currentFilter = chip.dataset.filter;
                renderChecklist();
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    dom.tabLogin.classList.toggle('hidden', tab !== 'login');
                    dom.tabRegister.classList.toggle('hidden', tab !== 'register');
                    dom.tabJoin.classList.toggle('hidden', tab !== 'join');
                    dom.alertBox.className = 'alert';
                    dom.alertBox.style.display = 'none';
                });
            });
            dom.joinSessionBtn.addEventListener('click', () => {
                const sid = dom.joinSessionId.value.trim();
                const uname = dom.joinUserName.value.trim();
                if (!sid || !uname) { showAlert('Введите ID сессии и имя', 'error'); return; }
                joinSharedSession(sid, uname);
            });

            async function bootstrap() {
                await initFirebase();
                const urlParams = new URLSearchParams(window.location.search);
                const sessionFromUrl = urlParams.get('session');
                if (sessionFromUrl && appState.firebaseAvailable) {
                    const localData = loadFromLocalStorage();
                    if (localData?.currentUsername) {
                        if (appState.firebaseAvailable) {
                            const cloudData = await loadUserDataFromCloud(localData.currentUsername);
                            if (cloudData && cloudData.passwordHash === localData.passwordHash) {
                                appState.currentUser = { username: localData.currentUsername, passwordHash: localData
                                        .passwordHash };
                                appState.checklists = cloudData.checklists || [];
                                appState.currentChecklistId = cloudData.currentChecklistId || appState.checklists[0]
                                    ?.id;
                                appState.theme = cloudData.theme || 'light';
                                appState.sharedSessionsMeta = cloudData.sharedSessionsMeta || [];
                            } else {
                                appState.currentUser = { username: localData.currentUsername, passwordHash: localData
                                        .passwordHash };
                                appState.checklists = localData.checklists || [];
                                appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]
                                    ?.id;
                                appState.theme = localData.theme || 'light';
                                appState.sharedSessionsMeta = localData.sharedSessionsMeta || [];
                            }
                        } else {
                            appState.currentUser = { username: localData.currentUsername, passwordHash: localData
                                    .passwordHash };
                            appState.checklists = localData.checklists || [];
                            appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                            appState.theme = localData.theme || 'light';
                            appState.sharedSessionsMeta = localData.sharedSessionsMeta || [];
                        }
                        if (appState.checklists.length === 0) createNewChecklist('Мой первый поход');
                        if (!appState.currentChecklistId && appState.checklists.length > 0)
                            appState.currentChecklistId = appState.checklists[0].id;
                        applyTheme();
                        if (appState.firebaseAvailable) { await persistData();
                            await loadSharedSessionsMeta(); }
                        await autoJoinSharedSession(sessionFromUrl);
                        return;
                    } else {
                        dom.joinSessionId.value = sessionFromUrl;
                        document.querySelector('[data-tab="join"]')?.click();
                        showLoginScreen();
                        return;
                    }
                }
                const localData = loadFromLocalStorage();
                if (localData?.currentUsername) {
                    if (appState.firebaseAvailable) {
                        const cloudData = await loadUserDataFromCloud(localData.currentUsername);
                        if (cloudData && cloudData.passwordHash === localData.passwordHash) {
                            appState.currentUser = { username: localData.currentUsername, passwordHash: localData
                                    .passwordHash };
                            appState.checklists = cloudData.checklists || [];
                            appState.currentChecklistId = cloudData.currentChecklistId || appState.checklists[0]?.id;
                            appState.theme = cloudData.theme || 'light';
                            appState.sharedSessionsMeta = cloudData.sharedSessionsMeta || [];
                        } else {
                            appState.currentUser = { username: localData.currentUsername, passwordHash: localData
                                    .passwordHash };
                            appState.checklists = localData.checklists || [];
                            appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                            appState.theme = localData.theme || 'light';
                            appState.sharedSessionsMeta = localData.sharedSessionsMeta || [];
                        }
                    } else {
                        appState.currentUser = { username: localData.currentUsername, passwordHash: localData
                                .passwordHash };
                        appState.checklists = localData.checklists || [];
                        appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                        appState.theme = localData.theme || 'light';
                        appState.sharedSessionsMeta = localData.sharedSessionsMeta || [];
                    }
                    if (appState.checklists.length === 0) createNewChecklist('Мой первый поход');
                    if (!appState.currentChecklistId && appState.checklists.length > 0)
                        appState.currentChecklistId = appState.checklists[0].id;
                    applyTheme();
                    if (appState.firebaseAvailable) { await persistData();
                        await loadSharedSessionsMeta(); }
                    renderApp();
                    return;
                }
                showLoginScreen();
            }
            bootstrap().catch(err => { console.error(err);
                showLoginScreen(); });
        })();
    </script>
</body>
</html>
