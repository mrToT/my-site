<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Походный чек-лист тихоходок</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js">
    </script>

    <style>
        :root {
            --primary: #4f7cff;
            --primary-light: #6b90ff;
            --primary-dark: #3a5fce;
            --accent: #34c759;
            --accent-light: #45d96a;
            --danger: #ff3b30;
            --danger-hover: #e0352b;
            --bg: #f0f2f7;
            --card-bg: #ffffff;
            --card-bg-glass: rgba(255, 255, 255, 0.75);
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-light: #8e8ea8;
            --border: #e8ecf2;
            --border-light: #f0f2f5;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.12);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --card-hover-bg: #f7f8fc;
            --input-bg: #f8f9fd;
            --stat-bg: #f5f6fb;
            --badge-optional-bg: #fff3cd;
            --badge-optional-text: #856404;
            --badge-required-bg: #ffe0e0;
            --badge-required-text: #b71c1c;
            --modal-overlay: rgba(0, 0, 0, 0.4);
            --category-header-bg: #fafbfd;
            --checkbox-bg: #ffffff;
            --checkbox-border: #d0d5e0;
            --progress-bg: #eef0f8;
            --progress-fill: var(--accent);
            --add-btn-hover-bg: #f0fff5;
            --item-hover-bg: #f0f3ff;
            --item-hover-border: #d5dbff;
            --item-hover-shadow: 0 4px 14px rgba(79, 124, 255, 0.1);
            --sync-synced-bg: #e8f9ec;
            --sync-synced-text: #1e7e34;
            --sync-pending-bg: #fff4e8;
            --sync-pending-text: #e65100;
            --alert-error-bg: #ffe8e8;
            --alert-error-text: #b71c1c;
            --alert-success-bg: #e6f9ea;
            --alert-success-text: #1b5e20;
            --default-badge-bg: #eef0f5;
            --default-badge-text: #5a5a7a;
            --admin-badge-bg: #e0eaff;
            --admin-badge-text: #1a3f8a;
            --shared-badge-bg: #e6f5ea;
            --shared-badge-text: #1b5e20;
            --trip-selector-bg: #fafbfd;
            --chip-bg: #f0f2f7;
            --chip-active-bg: var(--primary);
            --chip-active-text: #fff;
            --avatar-bg: #e0e5f0;
            --dropdown-bg: #ffffff;
            --dropdown-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            --ring-bg: #eef0f8;
            --ring-fill: var(--accent);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body.dark {
            --bg: #14182a;
            --card-bg: #1c2140;
            --card-bg-glass: rgba(28, 33, 64, 0.8);
            --text: #e8e8f0;
            --text-secondary: #b0b5cc;
            --text-light: #8a8faa;
            --border: #2a2f50;
            --border-light: #242a48;
            --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.35);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.5);
            --card-hover-bg: #232a4a;
            --input-bg: #1e2345;
            --stat-bg: #232a4a;
            --badge-optional-bg: #3d3820;
            --badge-optional-text: #ffd54f;
            --badge-required-bg: #3d2020;
            --badge-required-text: #ff8a80;
            --modal-overlay: rgba(0, 0, 0, 0.65);
            --category-header-bg: #1f2648;
            --checkbox-bg: #1c2140;
            --checkbox-border: #3a3f60;
            --progress-bg: #2a3050;
            --add-btn-hover-bg: #1a3028;
            --item-hover-bg: #252d52;
            --item-hover-border: #3a4570;
            --item-hover-shadow: 0 4px 14px rgba(79, 124, 255, 0.2);
            --sync-synced-bg: #1a3028;
            --sync-synced-text: #7ddf90;
            --sync-pending-bg: #3d3020;
            --sync-pending-text: #ffb74d;
            --alert-error-bg: #3d2020;
            --alert-error-text: #ff8a80;
            --alert-success-bg: #1a3028;
            --alert-success-text: #7ddf90;
            --default-badge-bg: #2a3050;
            --default-badge-text: #b0b5cc;
            --admin-badge-bg: #1a2a50;
            --admin-badge-text: #8ab4ff;
            --shared-badge-bg: #1a3028;
            --shared-badge-text: #7ddf90;
            --trip-selector-bg: #181d38;
            --chip-bg: #2a3050;
            --chip-active-bg: var(--primary);
            --chip-active-text: #fff;
            --avatar-bg: #2a3050;
            --dropdown-bg: #1c2140;
            --dropdown-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            --ring-bg: #2a3050;
            --glass-bg: rgba(28, 33, 64, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 16px;
            color: var(--text);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.35s, color 0.35s;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* --- HEADER --- */
        header {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 10px 18px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
            cursor: default;
            white-space: nowrap;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-light);
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .sync-dot.synced {
            background: var(--accent);
        }
        .sync-dot.pending {
            background: #ffb74d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .shared-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            display: none;
        }
        .shared-dot.visible {
            display: block;
        }
        .user-menu-trigger {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px 6px 8px;
            border-radius: 28px;
            background: var(--stat-bg);
            transition: var(--transition-fast);
            border: 1.5px solid transparent;
            user-select: none;
            font-weight: 600;
            font-size: 0.85rem;
            position: relative;
        }
        .user-menu-trigger:hover {
            background: var(--card-hover-bg);
            border-color: var(--border);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary);
            flex-shrink: 0;
        }
        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--dropdown-bg);
            border-radius: var(--radius);
            box-shadow: var(--dropdown-shadow);
            min-width: 200px;
            padding: 8px;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 2px;
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .user-dropdown.open {
            display: flex;
        }
        .user-dropdown button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.84rem;
            color: var(--text);
            transition: var(--transition-fast);
            white-space: nowrap;
            font-weight: 500;
        }
        .user-dropdown button:hover {
            background: var(--card-hover-bg);
            color: var(--primary);
        }
        .user-dropdown button.danger {
            color: var(--danger);
        }
        .user-dropdown button.danger:hover {
            background: #fff0f0;
        }
        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 8px;
        }

        /* --- TRIP SELECTOR --- */
        .trip-selector {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 10px 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .trip-tabs-scroll {
            display: flex;
            gap: 6px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .trip-tabs-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .trip-tabs-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .trip-tabs-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .trip-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            background: var(--chip-bg);
            border-radius: 28px;
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1.5px solid transparent;
            color: var(--text-secondary);
            transition: var(--transition-fast);
            flex-shrink: 0;
            user-select: none;
        }
        .trip-pill.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.35);
        }
        .trip-pill.shared-pill {
            border-style: dashed;
            border-color: var(--accent);
            color: var(--accent);
        }
        .trip-pill.shared-pill.active {
            background: var(--accent);
            color: #fff;
            border-style: solid;
            box-shadow: 0 4px 14px rgba(52, 199, 89, 0.35);
        }
        .trip-pill:hover:not(.active) {
            background: var(--card-hover-bg);
            border-color: var(--border);
        }
        .trip-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            transition: var(--transition-fast);
            font-size: 1.1rem;
        }
        .icon-btn:hover {
            background: var(--card-hover-bg);
            color: var(--primary);
        }
        .icon-btn.danger:hover {
            color: var(--danger);
            background: #fff0f0;
        }

        /* --- STATS BAR --- */
        .stats-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 18px 22px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .ring-progress {
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            position: relative;
        }
        .ring-progress svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .ring-progress circle {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        .ring-bg {
            stroke: var(--ring-bg);
        }
        .ring-fill {
            stroke: var(--ring-fill);
            stroke-dasharray: 157.08;
            stroke-dashoffset: 157.08;
        }
        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .stats-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 140px;
        }
        .stats-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-block {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .stat-label {
            font-size: 0.78rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .stat-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
        }
        .stat-value.accent {
            color: var(--accent);
        }
        .trip-date-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .trip-date-input {
            padding: 7px 12px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.8rem;
            outline: none;
            transition: var(--transition-fast);
            font-family: inherit;
        }
        .trip-date-input:focus {
            border-color: var(--primary);
        }
        .countdown-badge {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        /* --- SHARED PARTICIPANTS --- */
        .shared-participants-bar {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 12px 18px;
            box-shadow: var(--shadow-sm);
            border-left: 3px solid var(--accent);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            font-size: 0.84rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .participant-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--stat-bg);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.78rem;
        }
        .role-badge {
            font-size: 0.6rem;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .role-admin {
            background: var(--admin-badge-bg);
            color: var(--admin-badge-text);
        }
        .role-participant {
            background: var(--default-badge-bg);
            color: var(--default-badge-text);
        }

        /* --- SEARCH & FILTER CHIPS --- */
        .search-filter-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 10px 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .search-input-wrap {
            flex: 1;
            min-width: 160px;
            position: relative;
        }
        .search-input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 9px 14px 9px 38px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.88rem;
            outline: none;
            transition: var(--transition-fast);
            font-family: inherit;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.1);
        }
        .filter-chips {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .filter-chip {
            padding: 7px 13px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.76rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1.5px solid transparent;
            background: var(--chip-bg);
            color: var(--text-secondary);
            transition: var(--transition-fast);
            user-select: none;
        }
        .filter-chip.active {
            background: var(--chip-active-bg);
            color: var(--chip-active-text);
            border-color: var(--chip-active-bg);
            box-shadow: 0 2px 8px rgba(79, 124, 255, 0.3);
        }
        .filter-chip:hover:not(.active) {
            background: var(--card-hover-bg);
            border-color: var(--border);
        }
        .collapse-toggles {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        /* --- CATEGORY ACCORDION --- */
        .category-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xs);
            overflow: hidden;
            transition: box-shadow 0.3s, transform 0.3s;
            border: 1px solid var(--border-light);
        }
        .category-card:hover {
            box-shadow: var(--shadow-sm);
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            background: var(--category-header-bg);
            transition: background 0.2s;
            gap: 10px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .category-card.collapsed .category-header {
            border-radius: var(--radius-lg);
        }
        .category-header:hover {
            background: var(--card-hover-bg);
        }
        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            flex: 1;
            min-width: 0;
        }
        .category-progress {
            font-size: 0.78rem;
            color: var(--text-light);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .category-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .collapse-icon {
            transition: transform 0.35s ease;
            font-size: 1.2rem;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .category-card:not(.collapsed) .collapse-icon {
            transform: rotate(180deg);
        }
        .items-wrapper {
            max-height: 5000px;
            overflow: hidden;
            transition: max-height 0.45s ease, padding 0.35s ease, opacity 0.3s ease;
            padding: 14px 18px;
            opacity: 1;
        }
        .category-card.collapsed .items-wrapper {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 8px;
        }

        /* --- ITEM CARD --- */
        .item-card {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: var(--card-hover-bg);
            cursor: grab;
            transition: all 0.2s ease;
            gap: 10px;
            border: 1.5px solid transparent;
            position: relative;
        }
        .item-card:active {
            cursor: grabbing;
        }
        .item-card:hover {
            background: var(--item-hover-bg);
            border-color: var(--item-hover-border);
            box-shadow: var(--item-hover-shadow);
            transform: translateY(-1px);
        }
        .item-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--checkbox-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.7rem;
            background: var(--checkbox-bg);
            transition: all 0.2s ease;
            cursor: pointer;
            color: transparent;
        }
        .item-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            animation: checkboxPop 0.25s ease;
        }
        @keyframes checkboxPop {
            0% {
                transform: scale(1);
            }

            font-weight: 600;
            flex-shrink: 0;
            letter-spacing: 0.2px;

        .badge-optional {

            color: var(--badge-optional-text);
        }
        .badge-required {
            background: var(--badge-required-bg);
            color: var(--badge-required-text);
        }
        .badge-default {
            font-size: 0.6rem;
            padding: 2px 7px;
            border-radius: 14px;
            background: var(--default-badge-bg);
            color: var(--default-badge-text);
        }
        .item-delete-btn {
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
            flex-shrink: 0;
            color: var(--danger);
            font-size: 1rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 6px;
            border-radius: 50%;

        .item-card:hover .item-delete-btn {

        .item-delete-btn:hover {
            background: #fff0f0;
        }
        .sortable-ghost {
            opacity: 0.35;
            background: #d5dbff;

        }

        .btn {

            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.84rem;
            transition: var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: 20px;
        }
        .btn-xs {
            padding: 4px 9px;
            font-size: 0.7rem;
            border-radius: 14px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.35);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(79, 124, 255, 0.4);
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px rgba(52, 199, 89, 0.35);
        }
        .btn-accent:hover {
            background: #2eb150;
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 14px rgba(255, 59, 48, 0.35);
        }
        .btn-danger:hover {
            background: var(--danger-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--card-hover-bg);
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-light);
        }
        .btn-ghost:hover {
            background: var(--card-hover-bg);
            color: var(--primary);
        }

        .add-item-btn,
        .add-category-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            margin-top: 10px;
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-light);
            font-size: 0.82rem;
            transition: var(--transition-fast);
            background: transparent;
            width: 100%;
            justify-content: center;
            font-weight: 600;
        }
        .add-item-btn:hover,
        .add-category-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--add-btn-hover-bg);
        }

        /* --- MODAL (GLASS) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--glass-bg);
            border-radius: var(--radius-xl);
            padding: 24px 28px;
            max-width: 460px;
            width: 92%;
            box-shadow: var(--glass-shadow);
            color: var(--text);
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h3 {
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            transition: var(--transition-fast);
            color: var(--text);
            outline: none;
            font-family: inherit;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.08);
        }

        /* --- LOGIN CONTAINER --- */
        .login-container {
            max-width: 440px;
            margin: 30px auto;
            background: var(--glass-bg);
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
            padding: 32px 28px;
            width: 100%;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .login-title {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-radius: 28px;
            overflow: hidden;
            background: var(--chip-bg);
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            transition: var(--transition-fast);
            font-size: 0.84rem;
            border-radius: 24px;
            color: var(--text-secondary);
            font-family: inherit;
        }
        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .alert {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 14px;
            font-size: 0.8rem;
            display: none;
            font-weight: 500;
        }
        .alert-error {
            background: var(--alert-error-bg);
            color: var(--alert-error-text);
            display: block;
        }
        .alert-success {
            background: var(--alert-success-bg);
            color: var(--alert-success-text);
            display: block;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a2e;
            color: #fff;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 0.84rem;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
            animation: toastSlideUp 0.35s ease;
        }
        @keyframes toastSlideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 700px) {
            body {
                padding: 6px;
            }
            .items-grid {
                grid-template-columns: 1fr;
            }

                flex-direction: column;

                gap: 12px;
            }
            .trip-date-row {
                margin-left: 0;

                justify-content: flex-start;
            }
            .trip-selector {
                flex-direction: column;
                align-items: stretch;
            }
            .trip-tabs-scroll {
                order: -1;
            }
        }

            function openModal(title, contentHTML, onSave) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML =
                    `<div class="modal"><h3>${title}</h3><div>${contentHTML}</div><div class="modal-actions"><button class="btn btn-ghost" data-action="cancel">Отмена</button><button class="btn btn-primary" data-action="save">Сохранить</button></div></div>`;
                document.body.appendChild(overlay);
                const close = () => overlay.remove();
                overlay.querySelector('[data-action="cancel"]').addEventListener('click', close);
                overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
                overlay.querySelector('[data-action="save"]').addEventListener('click', () => {
                    const result = onSave(overlay.querySelector('.modal'));
                    if (result !== false) close();
                });
                setTimeout(() => { const input = overlay.querySelector('input'); if (input) input.focus(); }, 100);
            }

            function confirmDelete(msg, onConfirm) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML =
                    `<div class="modal"><h3>⚠️ Подтверждение</h3><p>${msg}</p><div class="modal-actions"><button class="btn btn-ghost" data-action="cancel">Отмена</button><button class="btn btn-danger" data-action="confirm">Удалить</button></div></div>`;
                document.body.appendChild(overlay);
                const close = () => overlay.remove();
                overlay.querySelector('[data-action="cancel"]').addEventListener('click', close);
                overlay.querySelector('[data-action="confirm"]').addEventListener('click', () => { close();
                    onConfirm(); });
            }

            async function saveUserDataToCloud(username, passwordHash) {
                if (!appState.firebaseAvailable || !appState.db) return;
                try {
                    await appState.db.collection('users').doc('user_' + username.toLowerCase()).set({
                        username,
                        passwordHash,
                        checklists: appState.checklists,
                        currentChecklistId: appState.currentChecklistId,

                        sharedSessionsMeta: appState.sharedSessionsMeta,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    }, { merge: true });
                    dom.syncDot.className = 'sync-dot synced';
                } catch (e) {
                    dom.syncDot.className = 'sync-dot pending';
                }

            async function loadUserDataFromCloud(username) {
                if (!appState.firebaseAvailable || !appState.db) return null;
                try {
                    const doc = await appState.db.collection('users').doc('user_' + username.toLowerCase()).get();
                    return doc.exists ? doc.data() : null;
                } catch (e) { return null; }
            }

            async function persistData() {
                saveToLocalStorage();
                if (appState.firebaseAvailable && appState.currentUser && !appState.currentUser.isGuest) {
                    await saveUserDataToCloud(appState.currentUser.username, appState.currentUser.passwordHash);
                }
