<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Походный чек-лист | Pro</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- SortableJS для drag-and-drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary: #4f7cff;
            --primary-dark: #3a5fce;
            --accent: #34c759;
            --danger: #ff3b30;
            --danger-hover: #e0352b;
            --bg: #f2f4f8;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-light: #6e6e8a;
            --border: #e5e7eb;
            --radius: 14px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --card-hover-bg: #f0f2f5;
            --input-bg: #f8f9fc;
            --stat-bg: #f8f9fc;
            --badge-optional-bg: #fff3cd;
            --badge-optional-text: #856404;
            --badge-required-bg: #ffe0e0;
            --badge-required-text: #b71c1c;
            --modal-overlay: rgba(0,0,0,0.35);
        }

        body.dark {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --text-light: #a0a0b0;
            --border: #2a2a4a;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
            --card-hover-bg: #1f2b47;
            --input-bg: #1f2b47;
            --stat-bg: #1f2b47;
            --badge-optional-bg: #4a4520;
            --badge-optional-text: #ffd54f;
            --badge-required-bg: #4a2020;
            --badge-required-text: #ff8a80;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px; }
        .logo span { font-size: 1.8rem; }
        .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
            background: transparent; color: var(--text);
        }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 8px; }
        .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(79,124,255,0.3); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(52,199,89,0.3); }
        .btn-accent:hover { background: #2eb150; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
        .btn-danger:hover { background: var(--danger-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--card-hover-bg); }
        .btn-ghost { background: transparent; color: var(--text-light); padding: 6px 10px; }
        .btn-ghost:hover { background: var(--card-hover-bg); color: var(--primary); }
        .btn-icon {
            width: 36px; height: 36px; padding: 0; border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; border: none; background: transparent;
            transition: var(--transition); color: var(--text-light);
        }
        .btn-icon:hover { background: var(--card-hover-bg); color: var(--primary); }

        .sync-badge {
            display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600;
            padding: 5px 12px; border-radius: 20px; background: var(--card-hover-bg); color: var(--text-light);
        }
        .sync-badge.synced { background: #e5f9e8; color: #1e7e34; }
        .sync-badge.pending { background: #fff3e0; color: #e65100; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

        .hidden { display: none !important; }

        /* Main layout */
        main { display: flex; gap: 20px; flex: 1; }
        .sidebar {
            width: 320px; flex-shrink: 0; background: var(--card-bg);
            border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow);
            height: fit-content; position: sticky; top: 20px; align-self: flex-start;
        }
        .content { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0; }

        /* Планировщик дат */
        .trip-date-section {
            margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
        }
        .countdown { font-size: 0.9rem; font-weight: 600; color: var(--primary); margin-top: 6px; }

        /* Поиск и фильтры */
        .search-filter-bar {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            background: var(--card-bg); padding: 12px 16px; border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }
        .search-input {
            flex: 1; min-width: 150px; padding: 8px 12px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
            font-size: 0.9rem; outline: none; transition: var(--transition);
        }
        .search-input:focus { border-color: var(--primary); }
        .filter-select {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text); font-size: 0.85rem;
            cursor: pointer; outline: none;
        }

        /* Прогресс */
        .progress-section h4 { font-size: 0.95rem; margin-bottom: 8px; }
        .progress-bar { height: 8px; background: #eef0f5; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; border-radius: 10px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: var(--stat-bg); padding: 14px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); }

        /* Категории */
        .category-card {
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: var(--shadow-sm); overflow: hidden; transition: var(--transition);
        }
        .category-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; cursor: pointer; user-select: none;
            background: #fafbfc; border-bottom: 1px solid transparent;
        }
        .category-header:hover { background: var(--card-hover-bg); }
        .category-card.expanded .category-header { border-bottom-color: var(--border); }
        .category-title { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.05rem; }
        .category-progress { font-size: 0.8rem; color: var(--text-light); margin-left: auto; margin-right: 12px; white-space: nowrap; }
        .collapse-icon { transition: transform 0.3s ease; font-size: 1.1rem; color: var(--text-light); }
        .category-card.expanded .collapse-icon { transform: rotate(180deg); }
        .items-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s ease; }
        .category-card.expanded .items-wrapper { max-height: 5000px; padding: 16px 20px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
        .item-card {
            display: flex; align-items: center; padding: 10px 14px; border-radius: 10px;
            background: var(--card-hover-bg); cursor: grab; transition: var(--transition);
            gap: 10px; position: relative; border: 1px solid transparent;
        }
        .item-card:active { cursor: grabbing; }
        .item-card:hover { background: #eef2ff; border-color: #d0d8ff; }
        .item-checkbox {
            width: 22px; height: 22px; border: 2px solid #cbd5e0; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            font-size: 0.8rem; background: #fff; transition: var(--transition);
        }
        .item-checkbox.checked { background: var(--primary); border-color: var(--primary); color: #fff; }
        .item-text { flex: 1; min-width: 0; word-break: break-word; font-size: 0.95rem; }
        .weight-badge {
            font-size: 0.7rem; margin-left: 6px; color: var(--text-light);
            cursor: pointer; display: inline-flex; align-items: center; gap: 2px;
            background: var(--stat-bg); padding: 2px 6px; border-radius: 12px;
        }
        .weight-badge:hover { background: var(--primary); color: #fff; }
        .item-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
        .badge-optional { background: var(--badge-optional-bg); color: var(--badge-optional-text); }
        .badge-required { background: var(--badge-required-bg); color: var(--badge-required-text); }
        .item-delete-btn { opacity: 0; transition: opacity 0.2s; flex-shrink: 0; color: var(--danger); font-size: 1.1rem; }
        .item-card:hover .item-delete-btn { opacity: 1; }
        .sortable-ghost { opacity: 0.4; background: #d0d8ff; }

        .add-item-btn, .add-category-btn {
            display: flex; align-items: center; gap: 6px; padding: 10px 14px;
            margin-top: 12px; border: 2px dashed #cbd5e0; border-radius: 10px;
            cursor: pointer; color: var(--text-light); font-size: 0.85rem; transition: var(--transition);
            background: transparent; width: 100%; justify-content: center; font-weight: 600;
        }
        .add-item-btn:hover, .add-category-btn:hover { border-color: var(--accent); color: var(--accent); background: #f3fff5; }

        /* Чек-листы (вкладки) */
        .checklist-tabs {
            display: flex; gap: 4px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px;
        }
        .checklist-tab {
            padding: 8px 16px; background: var(--card-hover-bg); border-radius: 20px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600; white-space: nowrap;
            border: 1px solid transparent; color: var(--text);
        }
        .checklist-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .checklist-tab:hover:not(.active) { background: var(--border); }

        /* Login */
        .login-container {
            max-width: 460px; margin: 30px auto; background: var(--card-bg);
            border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px 28px; width: 100%;
        }
        .login-title { text-align: center; margin-bottom: 24px; font-size: 1.5rem; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
        .form-input {
            width: 100%; padding: 12px 16px; background: var(--input-bg);
            border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.95rem;
            transition: var(--transition); color: var(--text); outline: none;
        }
        .form-input:focus { border-color: var(--primary); background: var(--card-bg); }

        .tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 10px; overflow: hidden; background: var(--card-hover-bg); padding: 3px; }
        .tab-btn {
            flex: 1; padding: 10px; border: none; cursor: pointer; font-weight: 600;
            background: transparent; transition: var(--transition); font-size: 0.9rem;
            border-radius: 8px; color: var(--text-light);
        }
        .tab-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .alert { padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; font-size: 0.85rem; display: none; }
        .alert-error { background: #ffe5e5; color: #b71c1c; display: block; }
        .alert-success { background: #e3f9e9; color: #1b5e20; display: block; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); backdrop-filter: blur(2px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--card-bg); border-radius: var(--radius); padding: 24px;
            max-width: 480px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            color: var(--text);
        }
        .modal h3 { margin-bottom: 16px; font-weight: 700; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        .toast {
            position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: #fff;
            padding: 12px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 500;
            z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        footer { text-align: center; padding: 10px; color: var(--text-light); font-size: 0.8rem; }

        @media (max-width: 850px) {
            body { padding: 12px; }
            main { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .items-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo"><span>🌲</span> Походный чек-лист Pro</div>
        <div class="header-right" id="headerRight">
            <span class="sync-badge hidden" id="syncBadge">💾 Локально</span>
            <span id="headerUserInfo" style="font-weight:600;"></span>
            <button class="btn btn-sm btn-outline" id="themeToggle" title="Тёмная/светлая тема">🌓</button>
            <button class="btn btn-sm btn-outline hidden" id="collapseAllBtn">📁 Свернуть всё</button>
            <button class="btn btn-sm btn-outline hidden" id="expandAllBtn">📂 Развернуть всё</button>
            <button class="btn btn-sm btn-outline hidden" id="resetChecksBtn">🔄 Сбросить отметки</button>
            <button class="btn btn-sm btn-outline hidden" id="exportBtn">📤 Экспорт</button>
            <button class="btn btn-sm btn-outline hidden" id="importBtn">📥 Импорт</button>
            <button class="btn btn-sm btn-outline hidden" id="shareBtn">🔗 Поделиться</button>
            <button class="btn btn-sm btn-outline hidden" id="loadSharedBtn">📋 Загрузить список</button>
            <button class="btn btn-sm btn-ghost hidden" id="logoutBtn" style="color:var(--danger);">🚪 Выйти</button>
        </div>
    </header>

    <main id="mainContent" class="hidden">
        <aside class="sidebar">
            <div class="user-card" style="text-align:center; margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:16px;">
                <div class="avatar" id="userAvatar" style="width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg,#4f7cff,#7b9cff); color:#fff; display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 10px;">?</div>
                <div class="user-name" id="usernameDisplay" style="font-weight:700;">Гость</div>
                <div class="user-email" id="userEmailDisplay" style="font-size:0.8rem; color:var(--text-light);"></div>
                <button class="switch-user-btn" id="switchUserBtn" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:6px;">↻ Сменить аккаунт</button>
            </div>

            <!-- Выбор чек-листа -->
            <div style="margin-bottom:12px;">
                <label class="form-label">🏕️ Активный список</label>
                <div class="checklist-tabs" id="checklistTabs"></div>
                <div style="display:flex; gap:6px; margin-top:6px;">
                    <button class="btn btn-sm btn-ghost" id="addChecklistBtn">➕ Новый</button>
                    <button class="btn btn-sm btn-ghost" id="copyChecklistBtn">📋 Копия</button>
                    <button class="btn btn-sm btn-ghost" id="renameChecklistBtn">✏️ Имя</button>
                    <button class="btn btn-sm btn-ghost" id="deleteChecklistBtn" style="color:var(--danger);">🗑️</button>
                </div>
            </div>

            <!-- Дата похода -->
            <div class="trip-date-section">
                <label class="form-label">📅 Дата похода</label>
                <input type="date" class="form-input" id="tripDateInput">
                <div class="countdown" id="countdownDisplay"></div>
            </div>

            <div class="progress-section">
                <h4>📊 Общий прогресс</h4>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="stats">
                    <div class="stat-card"><div class="stat-value" id="selectedCount">0</div><div class="stat-label">Выбрано</div></div>
                    <div class="stat-card"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Всего</div></div>
                </div>
                <div style="margin-top:12px; font-weight:600;">⚖️ Общий вес: <span id="totalWeight">0</span> г</div>
            </div>
        </aside>

        <div class="content">
            <div class="search-filter-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по названию...">
                <select class="filter-select" id="filterSelect">
                    <option value="all">Все предметы</option>
                    <option value="required">Обязательные</option>
                    <option value="optional">Необязательные</option>
                    <option value="checked">Отмеченные</option>
                    <option value="unchecked">Неотмеченные</option>
                </select>
            </div>
            <div id="checklistContent"></div>
            <button class="add-category-btn" id="addCategoryBtn">➕ Добавить свою категорию</button>
        </div>
    </main>

    <div id="loginContainer" class="login-container">
        <!-- Логин форма остаётся без изменений -->
        <h2 class="login-title">🌲 Добро пожаловать</h2>
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>
        <div id="alertBox" class="alert"></div>
        <div id="tabLogin">
            <div class="form-group"><label class="form-label">Логин</label><input type="text" class="form-input" id="loginUsername" placeholder="Ваш логин" autocomplete="username"></div>
            <div class="form-group"><label class="form-label">Пароль</label><input type="password" class="form-input" id="loginPassword" placeholder="Пароль" autocomplete="current-password"></div>
            <button class="btn btn-primary" id="loginBtn" style="width:100%;">🔑 Войти</button>
        </div>
        <div id="tabRegister" class="hidden">
            <div class="form-group"><label class="form-label">Придумайте логин</label><input type="text" class="form-input" id="regUsername" placeholder="Минимум 3 символа"></div>
            <div class="form-group"><label class="form-label">Пароль</label><input type="password" class="form-input" id="regPassword" placeholder="Минимум 4 символа"></div>
            <div class="form-group"><label class="form-label">Повторите пароль</label><input type="password" class="form-input" id="regPassword2" placeholder="Повторите пароль"></div>
            <button class="btn btn-accent" id="registerBtn" style="width:100%;">✨ Зарегистрироваться</button>
        </div>
    </div>

    <footer>© 2025 Походный чек-лист Pro · Все функции для настоящих походов</footer>
</div>

<div id="modalContainer"></div>
<div id="toastContainer"></div>

        // ============ МОДАЛЬНЫЕ ОКНА ============
        function openModal(title, contentHTML, onSave) {
            const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal"><h3>${title}</h3><div>${contentHTML}</div><div class="modal-actions"><button class="btn btn-ghost" data-action="cancel">Отмена</button><button class="btn btn-primary" data-action="save">Сохранить</button></div></div>`;
            document.body.appendChild(overlay);
            const close = () => overlay.remove();
            overlay.querySelector('[data-action="cancel"]').addEventListener('click', close);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
            overlay.querySelector('[data-action="save"]').addEventListener('click', () => {
                const result = onSave(overlay.querySelector('.modal'));
                if (result !== false) close();
            });
        }

        function confirmDelete(msg, onConfirm) {
            const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal"><h3>⚠️ Подтверждение</h3><p>${msg}</p><div class="modal-actions"><button class="btn btn-ghost" data-action="cancel">Отмена</button><button class="btn btn-danger" data-action="confirm">Удалить</button></div></div>`;
            document.body.appendChild(overlay);
            const close = () => overlay.remove();
            overlay.querySelector('[data-action="cancel"]').addEventListener('click', close);
            overlay.querySelector('[data-action="confirm"]').addEventListener('click', () => { close(); onConfirm(); });
        }

            confirmDelete(`Удалить список «${cl.name}»?`, () => {

                appState.currentChecklistId = appState.checklists[0]?.id;
                persistData();
                renderAll();
            });

        function migrateFromLegacy() {
            const raw = localStorage.getItem('hikingChecklist_v2');
            if (!raw) return false;
            try {
                const old = JSON.parse(raw);
                if (old.currentUsername && old.checklistData && !old.checklists) {
                    // Старая версия с одним списком
                    const newCL = {
                        id: 'cl_legacy',
                        name: 'Основной список',
                        tripDate: '',
                        checklistData: old.checklistData || JSON.parse(JSON.stringify(defaultChecklistData)),
                        selectedItems: old.selectedItems || {},
                        collapsedCategories: old.collapsedCategories || {},
                        userCategories: old.userCategories || []
                    };
                    appState.currentUser = { username: old.currentUsername, passwordHash: old.passwordHash };
                    appState.checklists = [newCL];
                    appState.currentChecklistId = newCL.id;
                    localStorage.removeItem('hikingChecklist_v2');
                    persistData();
                    return true;
                }
            } catch(e) {}
            return false;
        }

        // ============ СОХРАНЕНИЕ И ЗАГРУЗКА ============

                checklists: appState.checklists,

                theme: appState.theme,
            };
            localStorage.setItem('hikingChecklistPro', JSON.stringify(data));

        function loadFromLocalStorage() {
            const raw = localStorage.getItem('hikingChecklistPro');

                try { return JSON.parse(raw); } catch(e){}
            }
            return null;

        async function saveUserDataToCloud(username, passwordHash) {
            if (!appState.firebaseAvailable || !appState.db) return;
            try {
                await appState.db.collection('users').doc('user_' + username.toLowerCase()).set({
                    username, passwordHash,
                    checklists: appState.checklists,
                    currentChecklistId: appState.currentChecklistId,
                    theme: appState.theme,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                }, { merge: true });
                dom.syncBadge.textContent = '☁️ Облако'; dom.syncBadge.className = 'sync-badge synced';
            } catch(e) {
                dom.syncBadge.textContent = '⚠️ Ошибка'; dom.syncBadge.className = 'sync-badge pending';
            }
        }

        async function loadUserDataFromCloud(username) {
            if (!appState.firebaseAvailable || !appState.db) return null;
            try {
                const doc = await appState.db.collection('users').doc('user_' + username.toLowerCase()).get();
                return doc.exists ? doc.data() : null;
            } catch(e) { return null; }
        }

        async function persistData() {
            saveToLocalStorage();
            if (appState.firebaseAvailable && appState.currentUser) {
                await saveUserDataToCloud(appState.currentUser.username, appState.currentUser.passwordHash);
            }
        }

        // ============ FIREBASE INIT ============
        function initFirebase() {
            if (!firebaseConfig.apiKey || !firebaseConfig.projectId) {
                appState.firebaseAvailable = false;
                return Promise.resolve(false);
            }
            try {
                firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                return db.collection('_ping').doc('test').set({ time: Date.now() }, { merge: true })
                    .then(() => {
                        appState.firebaseAvailable = true;
                        appState.db = db;
                        return true;
                    }).catch(() => { appState.firebaseAvailable = false; return false; });
            } catch(e) { appState.firebaseAvailable = false; return Promise.resolve(false); }
        }

        // ============ АУТЕНТИФИКАЦИЯ ============
        async function handleLogin() {
            const username = dom.loginUsername.value.trim();
            const password = dom.loginPassword.value;
            if (!username || !password) { showAlert('Введите логин и пароль', 'error'); return; }
            const passwordHash = hashPassword(password);

            if (appState.firebaseAvailable) {
                const cloudData = await loadUserDataFromCloud(username);
                if (cloudData && cloudData.passwordHash === passwordHash) {
                    appState.currentUser = { username, passwordHash };
                    appState.checklists = cloudData.checklists || [];
                    appState.currentChecklistId = cloudData.currentChecklistId || appState.checklists[0]?.id;
                    appState.theme = cloudData.theme || 'light';
                    applyTheme();
                    saveToLocalStorage();
                    showAlert('✅ Вход (облако)', 'success');
                    renderApp(); return;
                } else if (cloudData && cloudData.passwordHash !== passwordHash) {
                    showAlert('❌ Неверный пароль', 'error'); return;
                }
            }

            const localData = loadFromLocalStorage();
            if (localData && localData.currentUsername === username && localData.passwordHash === passwordHash) {
                appState.currentUser = { username, passwordHash };
                appState.checklists = localData.checklists || [];
                appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                appState.theme = localData.theme || 'light';
                applyTheme();
                if (appState.firebaseAvailable) await persistData();
                showAlert('✅ Вход (локально)', 'success');
                renderApp(); return;
            }

            if (!appState.firebaseAvailable && !localData) {
                appState.currentUser = { username, passwordHash };
                createNewChecklist('Мой первый поход');
                applyTheme();
                showAlert('✅ Новый профиль', 'success');
                renderApp(); return;
            }
            showAlert('❌ Неверный логин или пароль', 'error');
        }

        async function handleRegister() {
            const username = dom.regUsername.value.trim();
            const password = dom.regPassword.value;
            const password2 = dom.regPassword2.value;
            if (username.length < 3) { showAlert('Логин не менее 3 символов', 'error'); return; }
            if (password.length < 4) { showAlert('Пароль не менее 4 символов', 'error'); return; }
            if (password !== password2) { showAlert('Пароли не совпадают', 'error'); return; }
            const passwordHash = hashPassword(password);

            if (appState.firebaseAvailable) {
                const existing = await loadUserDataFromCloud(username);
                if (existing) { showAlert('❌ Пользователь существует', 'error'); return; }
            } else {
                const local = loadFromLocalStorage();
                if (local && local.currentUsername === username) { showAlert('❌ Пользователь существует локально', 'error'); return; }
            }

            appState.currentUser = { username, passwordHash };
            appState.checklists = [];
            createNewChecklist('Мой первый поход');
            appState.theme = 'light';
            applyTheme();
            await persistData();
            showAlert('✅ Регистрация успешна!', 'success');
            renderApp();
        }

            const cl = getCurrentChecklist();

            const data = { name: cl.name, checklistData: cl.checklistData, userCategories: cl.userCategories };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'checklist.json'; a.click();
            URL.revokeObjectURL(url);
        }

        function importChecklist(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.checklistData) throw new Error();
                    const newCL = {
                        id: 'cl_import_' + Date.now(),
                        name: data.name || 'Импортированный список',
                        tripDate: '',
                        checklistData: data.checklistData,
                        userCategories: data.userCategories || [],
                        selectedItems: {},
                        collapsedCategories: {}
                    };
                    appState.checklists.push(newCL);
                    appState.currentChecklistId = newCL.id;
                    persistData();
                    renderAll();
                    showToast('Список импортирован!');
                } catch(ex) { showToast('Ошибка формата файла'); }
            };
            reader.readAsText(file);
        }

        // ============ ПРОГРЕСС И ВЕС ============
        function updateProgressAndWeight() {
            const cl = getCurrentChecklist();
            let selected = 0, total = 0, weight = 0;
            if (cl) {
                cl.checklistData.forEach(cat => cat.items.forEach(item => {
                    total++;
                    if (cl.selectedItems[item.id]) { selected++; weight += (item.weight || 0); }
                }));
            }
            dom.selectedCount.textContent = selected;
            dom.totalCount.textContent = total;
            dom.progressFill.style.width = (total ? Math.round((selected/total)*100) : 0) + '%';
            dom.totalWeight.textContent = weight;
        }

        function getCategoryProgress(cat, selectedItems) {
            const total = cat.items.length;
            const done = cat.items.filter(i => selectedItems[i.id]).length;
            return total ? `${done}/${total} (${Math.round(done/total*100)}%)` : '';
        }

            const cl = getCurrentChecklist();
            if (!cl) return;
            const searchTerm = dom.searchInput.value.toLowerCase();
            const filter = dom.filterSelect.value;

            dom.checklistContent.innerHTML = '';
            cl.checklistData.forEach(cat => {
                let filteredItems = cat.items;
                if (searchTerm) filteredItems = filteredItems.filter(i => i.text.toLowerCase().includes(searchTerm));
                if (filter === 'required') filteredItems = filteredItems.filter(i => i.required);
                if (filter === 'optional') filteredItems = filteredItems.filter(i => !i.required);
                if (filter === 'checked') filteredItems = filteredItems.filter(i => cl.selectedItems[i.id]);
                if (filter === 'unchecked') filteredItems = filteredItems.filter(i => !cl.selectedItems[i.id]);

                const isCollapsed = !!cl.collapsedCategories[cat.id];
                const card = document.createElement('div');
                card.className = 'category-card' + (isCollapsed ? '' : ' expanded');
                card.dataset.catId = cat.id;
                const allSelected = cat.items.length && cat.items.every(i => cl.selectedItems[i.id]);
                const progress = getCategoryProgress(cat, cl.selectedItems);
                card.innerHTML = `
                    <div class="category-header" data-action="toggle-collapse">
                        <div class="category-title">
                            <span>${escapeHTML(cat.category)}</span>
                            ${cat.isDefault ? '<span class="default-badge" style="font-size:0.65rem; background:#e5e7eb; padding:2px 6px; border-radius:20px;">базовая</span>' : ''}
                        </div>
                        <span class="category-progress">${progress}</span>
                        <div class="category-actions">
                            <button class="btn btn-sm btn-ghost" data-action="toggle-items">${allSelected ? '☑️ Снять' : '☐ Выбрать'}</button>
                            ${!cat.isDefault ? '<button class="btn-icon" data-action="delete-cat" style="color:var(--danger);">🗑️</button>' : ''}
                            <span class="collapse-icon">▼</span>
                        </div>
                    </div>
                    <div class="items-wrapper">
                        <div class="items-grid" data-cat-id="${cat.id}">
                            ${filteredItems.map(item => {
                                const checked = !!cl.selectedItems[item.id];
                                return `<div class="item-card" data-item-id="${item.id}">
                                    <div class="item-checkbox ${checked ? 'checked' : ''}">${checked ? '✓' : ''}</div>
                                    <div class="item-text">${escapeHTML(item.text)}</div>
                                    ${item.weight ? `<span class="weight-badge" data-action="edit-weight">⚖️ ${item.weight}г</span>` : ''}
                                    <span class="weight-badge" data-action="edit-weight" style="cursor:pointer;">⚖️</span>
                                    ${item.optional ? '<span class="item-badge badge-optional">необяз.</span>' : ''}
                                    ${item.required ? '<span class="item-badge badge-required">обяз.</span>' : ''}
                                    <button class="btn-icon item-delete-btn" data-action="delete-item" title="Удалить">🗑️</button>
                                </div>`;
                            }).join('')}
                        </div>
                        <button class="add-item-btn" data-action="add-item">+ Добавить предмет</button>
                    </div>`;
                card.addEventListener('click', function(e) {
                    const action = e.target.closest('[data-action]')?.dataset?.action;
                    if (action === 'toggle-collapse' && !e.target.closest('button') && !e.target.closest('.item-card')) {
                        cl.collapsedCategories[cat.id] = !cl.collapsedCategories[cat.id]; persistData(); renderAll(); return;
                    }
                    if (action === 'toggle-items') { e.stopPropagation(); toggleCategoryItems(cat.id, !allSelected); return; }
                    if (action === 'delete-cat') { e.stopPropagation(); deleteCategory(cat.id); return; }
                    if (action === 'add-item') { e.stopPropagation(); showAddItemModal(cat.id); return; }
                    if (action === 'delete-item') {
                        const itemId = e.target.closest('.item-card')?.dataset.itemId;
                        if (itemId) { e.stopPropagation(); deleteItem(cat.id, itemId); }
                        return;
                    }
                    if (action === 'edit-weight') {
                        const itemId = e.target.closest('.item-card')?.dataset.itemId;
                        if (itemId) { e.stopPropagation(); editItemWeight(cat.id, itemId); }
                        return;
                    }
                    const itemCard = e.target.closest('.item-card');
                    if (itemCard && !e.target.closest('button')) {
                        const itemId = itemCard.dataset.itemId;
                        if (itemId) { e.stopPropagation(); toggleItem(itemId); }
                    }
                });
                dom.checklistContent.appendChild(card);
            });

            // Инициализация drag-and-drop
            document.querySelectorAll('.items-grid').forEach(grid => {
                if (grid.sortableInstance) grid.sortableInstance.destroy();
                grid.sortableInstance = new Sortable(grid, {
                    group: 'items',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    onEnd: function(evt) {
                        const catId = evt.to.dataset.catId;
                        const cat = cl.checklistData.find(c => c.id === catId);
                        if (!cat) return;
                        const movedItemId = evt.item.dataset.itemId;
                        const oldIndex = evt.oldIndex;
                        const newIndex = evt.newIndex;
                        if (oldIndex !== newIndex) {
                            const item = cat.items.splice(oldIndex, 1)[0];
                            cat.items.splice(newIndex, 0, item);
                            persistData();
                        }
                    }
                });
            });

            updateProgressAndWeight();
            updateCollapseButtons();
        }

        function toggleItem(itemId) {
            const cl = getCurrentChecklist();
            if (!cl) return;
            cl.selectedItems[itemId] = !cl.selectedItems[itemId];
            persistData();
            renderAll();
        }

        function toggleCategoryItems(catId, selectAll) {
            const cl = getCurrentChecklist();
            const cat = cl.checklistData.find(c => c.id === catId);
            if (!cat) return;
            cat.items.forEach(i => { cl.selectedItems[i.id] = selectAll; });
            persistData();
            renderAll();
        }

        function deleteItem(catId, itemId) {
            const cl = getCurrentChecklist();
            const cat = cl.checklistData.find(c => c.id === catId);
            if (!cat) return;
            const item = cat.items.find(i => i.id === itemId);
            confirmDelete(`Удалить «${item.text}»?`, () => {
                cat.items = cat.items.filter(i => i.id !== itemId);
                delete cl.selectedItems[itemId];
                const uc = cl.userCategories?.find(c => c.id === catId);
                if (uc) uc.items = uc.items.filter(i => i.id !== itemId);
                persistData();
                renderAll();
            });
        }

        function deleteCategory(catId) {
            const cl = getCurrentChecklist();
            const cat = cl.checklistData.find(c => c.id === catId);
            if (!cat || cat.isDefault) { showToast('Базовые категории нельзя удалить'); return; }
            confirmDelete(`Удалить категорию «${cat.category}»?`, () => {
                cl.checklistData = cl.checklistData.filter(c => c.id !== catId);
                cl.userCategories = (cl.userCategories || []).filter(c => c.id !== catId);
                cat.items.forEach(i => delete cl.selectedItems[i.id]);
                persistData();
                renderAll();
            });
        }

        function editItemWeight(catId, itemId) {
            const cl = getCurrentChecklist();
            const cat = cl.checklistData.find(c => c.id === catId);
            const item = cat?.items.find(i => i.id === itemId);
            if (!item) return;
            const newWeight = prompt('Вес в граммах (0 - не указан):', item.weight || 0);
            if (newWeight !== null && !isNaN(newWeight)) {
                item.weight = Math.max(0, parseInt(newWeight) || 0);
                persistData();
                renderAll();
            }
        }

        function showAddItemModal(catId) {
            const cl = getCurrentChecklist();
            const cat = cl.checklistData.find(c => c.id === catId);
            openModal(`➕ Элемент в «${cat.category}»`, `
                <div class="form-group"><label class="form-label">Название</label><input class="form-input modal-name" placeholder="Название"></div>
                <div class="form-group"><label class="form-label">Тип</label><select class="form-input modal-type"><option value="required">Обязательный</option><option value="optional">Необязательный</option></select></div>
                <div class="form-group"><label class="form-label">Вес (г)</label><input class="form-input modal-weight" type="number" value="0" min="0"></div>
            `, (modal) => {
                const name = modal.querySelector('.modal-name').value.trim();
                if (!name) { showToast('Введите название'); return false; }
                const type = modal.querySelector('.modal-type').value;
                const weight = parseInt(modal.querySelector('.modal-weight').value) || 0;
                const newItem = { id: 'item_' + Date.now(), text: name, required: type === 'required', optional: type === 'optional', weight };
                cat.items.push(newItem);
                if (cl.userCategories) {
                    const uc = cl.userCategories.find(c => c.id === catId);
                    if (uc) uc.items.push(newItem);
                }
                persistData();
                renderAll();
            });
        }

        function showAddCategoryModal() {
            const cl = getCurrentChecklist();
            openModal('➕ Новая категория', `<div class="form-group"><label class="form-label">Название</label><input class="form-input modal-name" placeholder="Например: 🍔 Еда"></div>`, (modal) => {
                const name = modal.querySelector('.modal-name').value.trim();
                if (!name) { showToast('Введите название'); return false; }
                const newCat = { id: 'cat_user_' + Date.now(), category: name, isDefault: false, items: [] };
                cl.checklistData.push(newCat);
                if (!cl.userCategories) cl.userCategories = [];
                cl.userCategories.push(newCat);
                persistData();
                renderAll();
            });
        }

        function updateCollapseButtons() {
            const cl = getCurrentChecklist();
            if (!cl) return;
            const allCollapsed = cl.checklistData.every(c => cl.collapsedCategories[c.id]);
            dom.collapseAllBtn.classList.toggle('hidden', allCollapsed);
            dom.expandAllBtn.classList.toggle('hidden', !allCollapsed);
        }

        function collapseAll(doCollapse) {
            const cl = getCurrentChecklist();
            if (!cl) return;
            cl.checklistData.forEach(c => { cl.collapsedCategories[c.id] = doCollapse; });
            persistData();
            renderAll();
        }

        // ============ ДАТА ПОХОДА ============
        function updateTripDate() {
            const cl = getCurrentChecklist();
            if (!cl) return;
            cl.tripDate = dom.tripDateInput.value;
            persistData();
            renderCountdown();
        }

        function renderCountdown() {
            const cl = getCurrentChecklist();
            if (!cl || !cl.tripDate) { dom.countdownDisplay.textContent = ''; return; }
            const now = new Date();
            const trip = new Date(cl.tripDate);
            const diff = Math.ceil((trip - now) / (1000 * 60 * 60 * 24));
            if (diff > 0) dom.countdownDisplay.textContent = `До похода: ${diff} дн.`;
            else if (diff === 0) dom.countdownDisplay.textContent = 'Поход сегодня!';
            else dom.countdownDisplay.textContent = 'Поход завершён';
        }

        // ============ ГЛАВНЫЙ РЕНДЕРИНГ ============
        function renderAll() {
            renderChecklistTabs();
            const cl = getCurrentChecklist();
            if (cl) {
                dom.tripDateInput.value = cl.tripDate || '';
                renderCountdown();
            }
            renderChecklist();
            updateProgressAndWeight();
        }

        function renderApp() {
            if (!appState.currentUser) { showLoginScreen(); return; }
            dom.loginContainer.classList.add('hidden');
            dom.mainContent.classList.remove('hidden');
            dom.logoutBtn.classList.remove('hidden');
            dom.syncBadge.classList.remove('hidden');
            dom.usernameDisplay.textContent = appState.currentUser.username;
            dom.userAvatar.textContent = appState.currentUser.username.charAt(0).toUpperCase();
            dom.userEmailDisplay.textContent = appState.firebaseAvailable ? '☁️ Облако' : '💾 Локально';
            dom.headerUserInfo.textContent = appState.currentUser.username;
            dom.switchUserBtn.style.display = 'inline-block';

            // Показать кнопки управления
            dom.collapseAllBtn.classList.remove('hidden');
            dom.expandAllBtn.classList.add('hidden');
            dom.resetChecksBtn.classList.remove('hidden');
            dom.exportBtn.classList.remove('hidden');
            dom.importBtn.classList.remove('hidden');
            if (appState.firebaseAvailable) {
                dom.shareBtn.classList.remove('hidden');
                dom.loadSharedBtn.classList.remove('hidden');
            } else {
                dom.shareBtn.classList.add('hidden');
                dom.loadSharedBtn.classList.add('hidden');
            }
            renderAll();
        }

        function showLoginScreen() {
            dom.mainContent.classList.add('hidden');
            dom.loginContainer.classList.remove('hidden');
            dom.logoutBtn.classList.add('hidden');
            dom.syncBadge.classList.add('hidden');
            dom.collapseAllBtn.classList.add('hidden');
            dom.expandAllBtn.classList.add('hidden');
            dom.resetChecksBtn.classList.add('hidden');
            dom.exportBtn.classList.add('hidden');
            dom.importBtn.classList.add('hidden');
            dom.shareBtn.classList.add('hidden');
            dom.loadSharedBtn.classList.add('hidden');
            dom.headerUserInfo.textContent = '';
            dom.usernameDisplay.textContent = 'Гость';
            dom.userAvatar.textContent = '?';
            dom.userEmailDisplay.textContent = '';
            dom.switchUserBtn.style.display = 'none';
            dom.alertBox.className = 'alert'; dom.alertBox.style.display = 'none';
            dom.loginUsername.value = ''; dom.loginPassword.value = '';
            dom.regUsername.value = ''; dom.regPassword.value = ''; dom.regPassword2.value = '';
            dom.tabLogin.classList.remove('hidden'); dom.tabRegister.classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="login"]').classList.add('active');
        }

        // ============ ОБРАБОТЧИКИ ============
        dom.loginBtn.addEventListener('click', handleLogin);
        dom.registerBtn.addEventListener('click', handleRegister);
        dom.logoutBtn.addEventListener('click', handleLogout);
        dom.switchUserBtn.addEventListener('click', () => { handleLogout(); showLoginScreen(); });
        dom.themeToggle.addEventListener('click', toggleTheme);
        dom.collapseAllBtn.addEventListener('click', () => collapseAll(true));
        dom.expandAllBtn.addEventListener('click', () => collapseAll(false));
        dom.resetChecksBtn.addEventListener('click', resetChecks);
        dom.exportBtn.addEventListener('click', exportChecklist);
        dom.importBtn.addEventListener('click', () => dom.importFileInput.click());
        dom.importFileInput.addEventListener('change', (e) => { if (e.target.files[0]) importChecklist(e.target.files[0]); });
        dom.shareBtn.addEventListener('click', shareChecklist);
        dom.loadSharedBtn.addEventListener('click', loadSharedChecklist);
        dom.addCategoryBtn.addEventListener('click', showAddCategoryModal);
        dom.addChecklistBtn.addEventListener('click', () => {
            const name = prompt('Название нового списка:', 'Поход ' + new Date().toLocaleDateString());
            if (name) createNewChecklist(name);
        });
        dom.copyChecklistBtn.addEventListener('click', duplicateChecklist);
        dom.renameChecklistBtn.addEventListener('click', () => {
            const cl = getCurrentChecklist();
            if (cl) { const newName = prompt('Новое имя:', cl.name); if (newName) renameChecklist(newName); }
        });
        dom.deleteChecklistBtn.addEventListener('click', deleteChecklist);
        dom.tripDateInput.addEventListener('change', updateTripDate);
        dom.searchInput.addEventListener('input', renderChecklist);
        dom.filterSelect.addEventListener('change', renderChecklist);
        dom.loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
        dom.loginUsername.addEventListener('keydown', (e) => { if (e.key === 'Enter') dom.loginPassword.focus(); });
        dom.regPassword2.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleRegister(); });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                dom.tabLogin.classList.toggle('hidden', tab !== 'login');
                dom.tabRegister.classList.toggle('hidden', tab !== 'register');
                dom.alertBox.className = 'alert'; dom.alertBox.style.display = 'none';
            });
        });

        // ============ СТАРТ ============
        async function bootstrap() {
            await initFirebase();
            // Попытка миграции старых данных
            migrateFromLegacy();

            const localData = loadFromLocalStorage();
            if (localData && localData.currentUsername) {
                if (appState.firebaseAvailable) {
                    const cloudData = await loadUserDataFromCloud(localData.currentUsername);
                    if (cloudData && cloudData.passwordHash === localData.passwordHash) {
                        appState.currentUser = { username: localData.currentUsername, passwordHash: localData.passwordHash };
                        appState.checklists = cloudData.checklists || [];
                        appState.currentChecklistId = cloudData.currentChecklistId || appState.checklists[0]?.id;
                        appState.theme = cloudData.theme || 'light';
                    } else {
                        appState.currentUser = { username: localData.currentUsername, passwordHash: localData.passwordHash };
                        appState.checklists = localData.checklists || [];
                        appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                        appState.theme = localData.theme || 'light';
                    }
                } else {
                    appState.currentUser = { username: localData.currentUsername, passwordHash: localData.passwordHash };
                    appState.checklists = localData.checklists || [];
                    appState.currentChecklistId = localData.currentChecklistId || appState.checklists[0]?.id;
                    appState.theme = localData.theme || 'light';
                }
                if (appState.checklists.length === 0) createNewChecklist('Мой первый поход');
                applyTheme();
                if (appState.firebaseAvailable) await persistData();
                renderApp();
                return;
            }
            // Если нет локальных данных, показываем логин
            showLoginScreen();
        }
        bootstrap().catch(err => { console.error(err); showLoginScreen(); });
    })();
</script>
</body>
</html>
